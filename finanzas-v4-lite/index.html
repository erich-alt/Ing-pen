<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Finanzas v4 Lite</title><script src="../vendor/xlsx.full.min.js"></script><style>body{margin:0;background:#f4f6fb;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;color:#172033}.app{max-width:560px;margin:auto;padding-bottom:90px}header{position:sticky;top:0;background:#f4f6fb;padding:18px 16px;border-bottom:1px solid #e5e9f2}h1{margin:0;font-size:26px}.sub{color:#6b7280;margin:4px 0 0}.pill{float:right;background:#eef3ff;color:#315efb;border-radius:999px;padding:7px 10px;font-weight:800;font-size:12px}.card{background:#fff;border:1px solid #e5e9f2;border-radius:18px;padding:14px;margin:14px;box-shadow:0 10px 28px rgba(25,35,60,.08)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.metric{background:#fff;border:1px solid #e5e9f2;border-radius:18px;padding:14px;margin-bottom:12px}.label{font-size:11px;text-transform:uppercase;color:#6b7280;font-weight:800}.value{font-size:21px;font-weight:900;margin-top:9px}.green{color:#16a06d}.red{color:#d9435e}.blue{color:#315efb}.amber{color:#b7791f}.btn{border:0;border-radius:13px;min-height:42px;padding:10px 12px;background:#315efb;color:#fff;font-weight:900}.danger{background:#fff0f2;color:#d9435e;border:1px solid #ffd2da}.ok{background:#eafaf3;color:#16a06d;border:1px solid #c9f2df}.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;gap:4px;overflow:auto;background:#fff;border-top:1px solid #e5e9f2;padding:7px}.tab{min-width:80px;border:0;background:transparent;border-radius:14px;padding:8px;color:#6b7280;font-weight:800}.tab.on{background:#eef3ff;color:#315efb}input,select{width:100%;min-height:42px;border:1px solid #e5e9f2;border-radius:13px;padding:10px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.item{display:grid;grid-template-columns:1fr auto;gap:8px;padding:11px;border:1px solid #e5e9f2;border-radius:14px;margin:8px 0}.name{font-weight:850}.meta{font-size:12px;color:#6b7280;margin-top:3px}.amt{font-weight:900;text-align:right}.mini{font-size:12px;color:#6b7280;line-height:1.45}.warn{background:#fff9ed}.check{display:flex;gap:8px;align-items:center;font-size:12px;color:#6b7280;font-weight:800}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:#172033;color:#fff;border-radius:999px;padding:10px 14px;opacity:0}.show{opacity:1}</style></head><body><div class="app"><header><span class="pill">v4 LITE</span><h1 id="title">Panel</h1><p class="sub">Importador Excel corregido</p></header><main id="main"></main></div><nav class="tabs" id="tabs"></nav><div class="toast" id="toast"></div><script>const KEY='finanzas_v4_lite';let data=load(),tab='panel',preview=[],info='';const tabs=['panel','importar','ingresos','movs','datos'];function base(){return{income:[],tx:[],accounts:[{id:1,name:'Cuenta Corriente',type:'corriente',balance:0},{id:2,name:'Tarjeta Credito',type:'credito',used:0}]}}function load(){try{return Object.assign(base(),JSON.parse(localStorage.getItem(KEY)||'{}'))}catch(e){return base()}}function save(m){localStorage.setItem(KEY,JSON.stringify(data));render();msg(m||'Guardado')}function msg(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1400)}function money(n){return new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0}).format(Math.round(Number(n||0)))}function norm(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim()}function num(v){if(typeof v==='number')return v;if(v instanceof Date)return 0;let s=String(v||'').replace(/\$|\s|clp/gi,'');if(s.includes(',')&&s.includes('.'))s=s.replace(/\./g,'').replace(',','.');else if(s.includes(',')&&!s.includes('.'))s=s.replace(',','.');else if((s.match(/\./g)||[]).length>0)s=s.replace(/\./g,'');return Number(s.replace(/[^0-9.-]/g,''))||0}function esc(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}function date(v){if(v instanceof Date&&!isNaN(v))return v.toISOString().slice(0,10);if(typeof v==='number'&&window.XLSX){let d=XLSX.SSF.parse_date_code(v);if(d)return d.y+'-'+String(d.m).padStart(2,'0')+'-'+String(d.d).padStart(2,'0')}let s=String(v||''),m=s.match(/(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})/);if(m){let y=m[3].length==2?'20'+m[3]:m[3];return y+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0')}m=s.match(/(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);return m?m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0'):''}function setTab(t){tab=t;title.textContent=t[0].toUpperCase()+t.slice(1);render()}function init(){tabs.innerHTML=tabsList().map(t=>'<button class="tab" id="tab_'+t+'" onclick="setTab(\''+t+'\')">'+t+'</button>').join('');render()}function tabsList(){return tabs}function render(){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));let b=document.getElementById('tab_'+tab);if(b)b.classList.add('on');main.innerHTML=views[tab]()}function panel(){let gross=data.income.reduce((s,i)=>s+Number(i.gross||0),0),net=data.income.reduce((s,i)=>s+Number(i.net||0),0),tax=data.income.reduce((s,i)=>s+Number(i.tax||0),0);return '<div class="card warn"><b>Version corregida</b><p class="mini">Usa esta para probar tu Excel. Ignora Resumen, UF y Fuentes, y lee la hoja Ingresos.</p></div><div class="card"><div class="grid"><div class="metric"><div class="label">Haberes</div><div class="value blue">'+money(gross)+'</div></div><div class="metric"><div class="label">Liquido</div><div class="value green">'+money(net)+'</div></div><div class="metric"><div class="label">Impuesto</div><div class="value red">'+money(tax)+'</div></div><div class="metric"><div class="label">Registros</div><div class="value amber">'+data.income.length+'</div></div></div></div>'}function importar(){return '<div class="card"><b>Importar Excel</b><p class="mini">Selecciona la plantilla Ingresos 2026.</p><input type="file" accept=".xlsx,.xls,.csv" onchange="readFile(event)"></div><div class="card"><b>Vista previa</b><p class="mini">'+esc(info)+'</p>'+previewHtml()+(preview.length?'<div class="actions"><button class="btn ok" onclick="commit()">Importar</button><button class="btn danger" onclick="preview=[];info=\'\';render()">Descartar</button></div>':'')+'</div>'}function previewHtml(){if(!preview.length)return '<p class="mini">Sin archivo cargado.</p>';return preview.map((r,i)=>'<div><div class="item"><div><div class="name">'+esc(r.desc)+'</div><div class="meta">'+esc(r.date)+' - '+esc(r.kind)+' - '+esc(r.source)+'</div><div class="meta">'+esc(r.note)+'</div></div><div class="amt green">'+money(r.net||r.amount||r.gross)+'</div></div><label class="check"><input id="p'+i+'" type="checkbox" checked> importar</label></div>').join('')}async function readFile(e){let f=e.target.files[0];if(!f)return;preview=[];info='';try{let wb=XLSX.read(await f.arrayBuffer(),{type:'array',cellDates:true});let scan=[];wb.SheetNames.forEach(name=>{let n=norm(name);if(n.includes('resumen')||n.includes('fuentes')||n.includes('uf')){scan.push(name+' omitida');return}let aoa=XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,defval:'',raw:true});let c=parseSheet(aoa,name,f.name);if(c)scan.push(name+': '+c)});info=scan.join(' / ')||'No encontre hoja Ingresos';render();msg(preview.length+' detectados')}catch(err){info='Error: '+err.message;render()}}function parseSheet(aoa,sheet,file){let added=0;for(let r=0;r<Math.min(25,aoa.length);r++){let h=(aoa[r]||[]).map(norm),line=h.join('|'),type='';if(norm(sheet).includes('ingres')||(line.includes('fecha pago')&&line.includes('liquido clp')))type='ingresos';else if(norm(sheet).includes('pension'))type='pension';else if(line.includes('glosa')||line.includes('cargo')||line.includes('abono'))type='movs';if(!type)continue;for(let i=r+1;i<aoa.length;i++){let row=aoa[i]||[];if(row.every(x=>String(x).trim()===''))continue;let o=type=='ingresos'?incomeRow(row,h,sheet,file):type=='pension'?pensionRow(row,h,sheet,file):movRow(row,h,sheet,file);if(o){preview.push(o);added++}}break}return added}function val(row,h,names){let i=h.findIndex(x=>names.some(n=>x.includes(norm(n))));return i>=0?row[i]:''}function incomeRow(row,h,sheet,file){let d=date(val(row,h,['fecha pago','fecha'])),tipo=String(val(row,h,['tipo ingreso','tipo'])||'sueldo'),gross=Math.abs(num(val(row,h,['total haberes clp','total haberes','haberes']))),net=Math.abs(num(val(row,h,['liquido clp','liquido','neto'])));if(!d||(!gross&&!net))return null;return{kind:'liquidacion',source:file+' / '+sheet,date:d,desc:String(val(row,h,['concepto','documento base','descripcion'])||tipo),type:tipo,gross:gross,net:net,tax:Math.abs(num(val(row,h,['impuesto clp','impuesto']))),afp:Math.abs(num(val(row,h,['afp clp','afp']))),health:Math.abs(num(val(row,h,['salud clp','salud','isapre']))),taxable:Math.abs(num(val(row,h,['base tributable','base imponible','tributable'])))||gross,rentYear:Math.abs(num(val(row,h,['ano tributario base','año tributario base','ano renta','año renta'])))||new Date(d).getFullYear(),note:'Hoja Ingresos detectada'}}function pensionRow(row,h,sheet,file){let d=date(val(row,h,['fecha pago','fecha'])),a=Math.abs(num(val(row,h,['monto pension clp','monto pension','monto'])));return d&&a?{kind:'pension',source:file+' / '+sheet,date:d,desc:'Pago pension',amount:a,note:'Hoja pension detectada'}:null}function movRow(row,h,sheet,file){let a=Math.abs(num(val(row,h,['cargo','debe','monto','importe'])));return a>999?{kind:'movimiento',source:file+' / '+sheet,date:date(val(row,h,['fecha']))||new Date().toISOString().slice(0,10),desc:String(val(row,h,['descripcion','glosa','detalle'])||'Movimiento'),amount:a,note:'Movimiento detectado'}:null}function commit(){let c=0;preview.forEach((r,i)=>{let cb=document.getElementById('p'+i);if(cb&&!cb.checked)return;if(r.kind=='liquidacion'){data.income.push({id:Date.now()+i,type:norm(r.type).includes('bono')?'bono':'sueldo',date:r.date,desc:r.desc,gross:r.gross,net:r.net,tax:r.tax,afp:r.afp,health:r.health,taxable:r.taxable,rentYear:r.rentYear});c++}else if(r.kind=='pension'){data.income.push({id:Date.now()+i,type:'pension',date:r.date,desc:r.desc,gross:0,net:0,taxable:0,tax:0,pensionPayment:r.amount,rentYear:new Date(r.date).getFullYear()});c++}else{data.tx.push({id:Date.now()+i,type:'gasto',date:r.date,desc:r.desc,amount:r.amount});c++}});preview=[];info='';save(c+' importados')}function ingresos(){return '<div class="card"><b>Ingresos</b>'+(!data.income.length?'<p class="mini">Sin ingresos.</p>':data.income.slice().reverse().map(i=>'<div class="item"><div><div class="name">'+esc(i.desc||i.type)+'</div><div class="meta">'+esc(i.date)+' - '+esc(i.type)+' - AT '+esc(i.rentYear)+'</div></div><div class="amt green">'+money(i.net||i.pensionPayment||i.gross)+'</div></div>').join(''))+'</div>'}function movs(){return '<div class="card"><b>Movimientos</b>'+(!data.tx.length?'<p class="mini">Sin movimientos.</p>':data.tx.slice().reverse().map(x=>'<div class="item"><div><div class="name">'+esc(x.desc)+'</div><div class="meta">'+esc(x.date)+'</div></div><div class="amt red">'+money(x.amount)+'</div></div>').join(''))+'</div>'}function datos(){return '<div class="card"><b>Datos</b><p class="mini">Ingresos: '+data.income.length+' / Movimientos: '+data.tx.length+'</p><button class="btn danger" style="width:100%" onclick="if(confirm(\'Limpiar datos?\')){data=base();save(\'Limpio\')}">Limpiar datos</button></div>'}const views={panel:panel,importar:importar,ingresos:ingresos,movs:movs,cuentas:panel,datos:datos};init();</script></body></html>
