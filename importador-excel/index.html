<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Importador Excel</title><script src="../vendor/xlsx.full.min.js"></script><style>body{margin:0;background:#f4f6fb;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;color:#172033}header{position:sticky;top:0;background:#f4f6fb;padding:18px 16px;border-bottom:1px solid #e5e9f2}h1{margin:0;font-size:26px}.sub{color:#6b7280;margin:4px 0 0}.pill{float:right;background:#eef3ff;color:#315efb;border-radius:999px;padding:7px 10px;font-weight:800;font-size:12px}.card{background:#fff;border:1px solid #e5e9f2;border-radius:18px;padding:14px;margin:14px;box-shadow:0 10px 28px rgba(25,35,60,.08)}.mini{font-size:12px;color:#6b7280;line-height:1.45}.item{display:grid;grid-template-columns:1fr auto;gap:8px;padding:11px;border:1px solid #e5e9f2;border-radius:14px;margin:8px 0;background:#fbfcff}.name{font-weight:850}.meta{font-size:12px;color:#6b7280;margin-top:3px}.amt{font-weight:900;text-align:right;color:#16a06d}.badge{display:inline-block;background:#eef3ff;color:#315efb;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:800}.warn{background:#fff9ed}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.metric{border:1px solid #e5e9f2;border-radius:18px;padding:14px}.label{font-size:11px;text-transform:uppercase;color:#6b7280;font-weight:800}.value{font-size:21px;font-weight:900;margin-top:8px}.blue{color:#315efb}.green{color:#16a06d}.red{color:#d9435e}input{width:100%;min-height:44px}.btn{border:0;border-radius:13px;min-height:42px;padding:10px 12px;background:#315efb;color:#fff;font-weight:900;width:100%;margin-top:10px}</style></head><body><header><span class="pill">TEST</span><h1>Importador Excel</h1><p class="sub">Prueba simple de plantilla Ingresos</p></header><main><div class="card warn"><b>Prueba directa</b><p class="mini">Carga el mismo Excel. Esta pantalla ignora hojas Resumen, Fuentes y UF, y busca la hoja Ingresos.</p></div><div class="card"><input id="file" type="file" accept=".xlsx,.xls,.csv"><p id="status" class="mini">Sin archivo cargado.</p></div><div class="card"><span id="count" class="badge">0 detectados</span><div id="summary"></div><div id="list"></div></div></main><script>let rows=[];const file=document.getElementById('file'),statusEl=document.getElementById('status'),countEl=document.getElementById('count'),list=document.getElementById('list'),summary=document.getElementById('summary');file.addEventListener('change',readFile);function norm(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim()}function esc(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}function money(n){return new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0}).format(Math.round(Number(n||0)))}function num(v){if(typeof v==='number')return v;if(v instanceof Date)return 0;let s=String(v||'').replace(/\$|\s|clp/gi,'');if(s.includes(',')&&s.includes('.'))s=s.replace(/\./g,'').replace(',','.');else if(s.includes(',')&&!s.includes('.'))s=s.replace(',','.');else if((s.match(/\./g)||[]).length>0)s=s.replace(/\./g,'');return Number(s.replace(/[^0-9.-]/g,''))||0}function fmtDate(v){if(v instanceof Date&&!isNaN(v))return v.toISOString().slice(0,10);if(typeof v==='number'&&window.XLSX){let d=XLSX.SSF.parse_date_code(v);if(d)return d.y+'-'+String(d.m).padStart(2,'0')+'-'+String(d.d).padStart(2,'0')}let s=String(v||''),m=s.match(/(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})/);if(m){let y=m[3].length===2?'20'+m[3]:m[3];return y+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0')}m=s.match(/(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);return m?m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0'):''}function val(row,h,names){let i=h.findIndex(x=>names.some(n=>x.includes(norm(n))));return i>=0?row[i]:''}async function readFile(e){rows=[];list.innerHTML='';summary.innerHTML='';let f=e.target.files[0];if(!f)return;try{let wb=XLSX.read(await f.arrayBuffer(),{type:'array',cellDates:true});let scan=[];wb.SheetNames.forEach(name=>{let n=norm(name);if(n.includes('resumen')||n.includes('fuentes')||n.includes('uf')){scan.push(name+' omitida');return}let aoa=XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,defval:'',raw:true});let c=parseSheet(aoa,name,f.name);if(c)scan.push(name+': '+c)});statusEl.textContent=scan.join(' / ')||'No encontré hoja Ingresos';render()}catch(err){statusEl.textContent='Error leyendo Excel: '+err.message}}function parseSheet(aoa,sheet,file){let added=0;for(let r=0;r<Math.min(25,aoa.length);r++){let h=(aoa[r]||[]).map(norm),line=h.join('|');let isIngresos=norm(sheet).includes('ingres')||(line.includes('fecha pago')&&line.includes('liquido clp'));if(!isIngresos)continue;for(let i=r+1;i<aoa.length;i++){let row=aoa[i]||[];if(row.every(x=>String(x).trim()===''))continue;let d=fmtDate(val(row,h,['fecha pago','fecha']));let gross=Math.abs(num(val(row,h,['total haberes clp','total haberes','haberes'])));let net=Math.abs(num(val(row,h,['liquido clp','liquido','neto'])));if(!d||(!gross&&!net))continue;rows.push({date:d,type:String(val(row,h,['tipo ingreso','tipo'])||'sueldo'),desc:String(val(row,h,['concepto','documento base','descripcion'])||'Ingreso'),gross:gross,net:net,tax:Math.abs(num(val(row,h,['impuesto clp','impuesto']))),taxable:Math.abs(num(val(row,h,['base tributable','base imponible','tributable'])))||gross,rentYear:Math.abs(num(val(row,h,['ano tributario base','año tributario base','ano renta','año renta'])))||new Date(d).getFullYear(),source:file+' / '+sheet});added++}}break}return added}function render(){countEl.textContent=rows.length+' detectados';let gross=rows.reduce((s,r)=>s+r.gross,0),net=rows.reduce((s,r)=>s+r.net,0),tax=rows.reduce((s,r)=>s+r.tax,0);summary.innerHTML='<div class="grid" style="margin-top:12px"><div class="metric"><div class="label">Haberes</div><div class="value blue">'+money(gross)+'</div></div><div class="metric"><div class="label">Líquido</div><div class="value green">'+money(net)+'</div></div><div class="metric"><div class="label">Impuesto</div><div class="value red">'+money(tax)+'</div></div><div class="metric"><div class="label">Registros</div><div class="value">'+rows.length+'</div></div></div>';list.innerHTML=rows.map(r=>'<div class="item"><div><div class="name">'+esc(r.desc)+'</div><div class="meta">'+esc(r.date)+' · '+esc(r.type)+' · AT '+esc(r.rentYear)+'</div><div class="meta">Base '+money(r.taxable)+' · '+esc(r.source)+'</div></div><div class="amt">'+money(r.net)+'</div></div>').join('')}</script></body></html>
