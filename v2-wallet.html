<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Finanzas Pro">
  <meta name="theme-color" content="#0f766e">
  <link rel="apple-touch-icon" href="icon-180.png">
  <title>Finanzas Pro Wallet</title>
  <style>body{margin:0;background:#f5f7f4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#13221f}.loading{padding:24px;text-align:center;font-weight:800}</style>
</head>
<body>
  <div class="loading">Cargando Finanzas Pro...</div>
  <script>
    (async function(){
      try{
        const r = await fetch('./v2.html?v=stage2-base5', {cache:'no-store'});
        let html = await r.text();
        html = html.replace(/v2-stage2\.js\?v=\d+/g, 'v2-stage2.js?v=2');
        const walletTag = '<script src="./v2-stage3.js?v=1"></scr' + 'ipt>';
        const stage4Tag = '<script src="./v2-stage4.js?v=1"></scr' + 'ipt>';
        const analysisTag = '<script src="./v2-stage5-analysis.js?v=1"></scr' + 'ipt>';
        const importTag = '<script src="./v2-stage6-import.js?v=1"></scr' + 'ipt>';
        const proTag = '<script src="./v2-stage7-pro.js?v=2"></scr' + 'ipt>';
        const planningAnalysisTag = '<script src="./v2-stage8-planning-analysis.js?v=2"></scr' + 'ipt>';
        const walletSyncTag = '<script src="./v2-stage9-wallet-sync.js?v=1"></scr' + 'ipt>';
        const cleanupTag = '<script src="./v2-stage10-cleanup.js?v=1"></scr' + 'ipt>';
        const resetTag = '<script src="./v2-stage11-reset.js?v=2"></scr' + 'ipt>';
        if(!html.includes('v2-stage3.js')) html = html.replace('</body>', walletTag + '\n</body>');
        if(!html.includes('v2-stage4.js')) html = html.replace('</body>', stage4Tag + '\n</body>');
        if(!html.includes('v2-stage5-analysis.js')) html = html.replace('</body>', analysisTag + '\n</body>');
        if(!html.includes('v2-stage6-import.js')) html = html.replace('</body>', importTag + '\n</body>');
        if(!html.includes('v2-stage7-pro.js')) html = html.replace('</body>', proTag + '\n</body>');
        if(!html.includes('v2-stage8-planning-analysis.js')) html = html.replace('</body>', planningAnalysisTag + '\n</body>');
        if(!html.includes('v2-stage9-wallet-sync.js')) html = html.replace('</body>', walletSyncTag + '\n</body>');
        if(!html.includes('v2-stage10-cleanup.js')) html = html.replace('</body>', cleanupTag + '\n</body>');
        if(!html.includes('v2-stage11-reset.js')) html = html.replace('</body>', resetTag + '\n</body>');
        document.open(); document.write(html); document.close();
      }catch(e){
        document.body.innerHTML = '<div class="loading">No se pudo cargar la app. Revisa conexion e intenta de nuevo.</div>';
      }
    })();
  </script>
</body>
</html>
