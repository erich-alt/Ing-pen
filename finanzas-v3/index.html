<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f4f6fb">
<title>Finanzas v3</title>
<script src="../vendor/xlsx.full.min.js"></script>
<script src="../vendor/pdf.min.js"></script>
<style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#172033;--muted:#6b7280;--line:#e5e9f2;--blue:#315efb;--green:#16a06d;--red:#d9435e;--amber:#b7791f;--soft:#eef3ff;--shadow:0 10px 28px rgba(25,35,60,.08)}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;color:var(--ink)}.app{max-width:560px;margin:0 auto;min-height:100vh;padding-bottom:102px}.top{position:sticky;top:0;z-index:5;background:rgba(244,246,251,.95);backdrop-filter:blur(16px);padding:max(14px,env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid var(--line)}h1{margin:0;font-size:24px;letter-spacing:-.04em}.sub{margin:4px 0 0;color:var(--muted);font-size:12px}.pill{padding:7px 10px;border-radius:999px;background:var(--soft);font-size:11px;font-weight:850;color:var(--blue)}.row{display:flex;gap:10px;align-items:center;justify-content:space-between}main{padding:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:var(--shadow);margin-bottom:12px}.metric{min-height:92px}.label{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:850}.value{margin-top:9px;font-size:21px;line-height:1;font-weight:950;word-break:break-word}.green{color:var(--green)}.red{color:var(--red)}.blue{color:var(--blue)}.amber{color:var(--amber)}button,input,select,textarea{font:inherit}input,select,textarea{width:100%;min-height:42px;border:1px solid var(--line);border-radius:13px;background:#fbfcff;padding:10px;color:var(--ink)}label{display:block;margin:0 0 5px;font-size:11px;color:var(--muted);font-weight:850}.form{display:grid;grid-template-columns:1fr 1fr;gap:9px}.full{grid-column:1/-1}.btn{border:0;border-radius:13px;min-height:42px;padding:10px 12px;background:var(--blue);color:#fff;font-weight:900}.btn.sec{background:#eef3ff;color:var(--blue);border:1px solid #dbe4ff}.btn.danger{background:#fff0f2;color:var(--red);border:1px solid #ffd2da}.btn.green{background:#eafaf3;color:var(--green);border:1px solid #c9f2df}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}.list{display:grid;gap:8px}.item{display:grid;grid-template-columns:1fr auto;gap:8px;padding:11px;border:1px solid var(--line);border-radius:14px;background:#fbfcff}.name{font-weight:850}.meta{margin-top:3px;font-size:12px;color:var(--muted);line-height:1.35}.amt{font-weight:950;text-align:right}.mini{font-size:12px;color:var(--muted);line-height:1.45}.hidden{display:none!important}.warn{background:#fff9ed;border-color:#f5ddb3}.hr{height:1px;background:var(--line);margin:12px 0}.tabs{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:560px;display:flex;gap:4px;overflow-x:auto;padding:7px 7px max(9px,env(safe-area-inset-bottom));background:rgba(255,255,255,.97);border-top:1px solid var(--line);backdrop-filter:blur(16px);z-index:10}.tab{border:0;background:transparent;border-radius:14px;min-width:68px;min-height:54px;color:var(--muted);font-size:9px;font-weight:850;display:flex;flex-direction:column;align-items:center;justify-content:center}.tab span{font-size:21px;margin-bottom:2px}.tab.active{background:var(--soft);color:var(--blue)}.section-title{font-size:17px;font-weight:950;margin:0 0 11px}.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#172033;color:#fff;border-radius:999px;padding:10px 14px;font-size:12px;font-weight:800;opacity:0;pointer-events:none;transition:.2s;z-index:20}.toast.show{opacity:1}.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}.chip{border:1px solid var(--line);background:#fff;color:var(--muted);padding:8px 10px;border-radius:999px;font-size:12px;font-weight:850;white-space:nowrap}.chip.active{background:var(--soft);border-color:#dbe4ff;color:var(--blue)}.check{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--muted);font-weight:850}.check input{width:auto;min-height:auto}.filebox{border:2px dashed #c7d2fe;border-radius:18px;background:#fbfcff;padding:18px;text-align:center}.preview{max-height:360px;overflow:auto}.badge{display:inline-flex;border-radius:999px;padding:4px 8px;background:var(--soft);color:var(--blue);font-size:11px;font-weight:850}.bad{background:#fff0f2;color:var(--red)}.ok{background:#eafaf3;color:var(--green)}.table{overflow:auto}table{width:100%;border-collapse:collapse;min-width:620px}th,td{font-size:12px;padding:8px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="row"><div><h1 id="title">Panel</h1><p class="sub">Finanzas + Ingresos + Importación Excel/PDF</p></div><div class="pill">v3 LOCAL</div></div></header>
<main id="main"></main>
<nav class="tabs" id="tabs"></nav>
</div>
<div id="toast" class="toast"></div>
<input id="jsonFile" class="hidden" type="file" accept="application/json,.json">
<script>
if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'}
const KEY='finanzas_integrada_v3';
const TABS=[['panel','💲','Panel'],['registros','🕐','Registros'],['cuentas','🏦','Cuentas'],['categorias','🗂️','Categorías'],['vehiculo','⛽','Vehículo'],['planificar','📋','Planificar'],['deudas','⚖️','Deudas'],['ingresos','💰','Ingresos'],['impuestos','🧾','Impuestos'],['importar','📥','Importar'],['datos','⚙️','Datos']];
const DEFAULT={accounts:[{id:1,name:'Cuenta Corriente',type:'corriente',balance:0},{id:2,name:'Cuenta Ahorro',type:'ahorro',balance:0},{id:3,name:'Tarjeta Crédito',type:'credito',used:0,limit:1000000}],cats:[{id:1,name:'Alimentación',icon:'🛒'},{id:2,name:'Hogar',icon:'🏠'},{id:3,name:'Vehículo / Mant.',icon:'🔧'},{id:4,name:'Niños / Familia',icon:'👨‍👩‍👧‍👦'},{id:5,name:'Deudas / Préstamos',icon:'🏦'},{id:6,name:'Sueldo / Ingresos',icon:'💰'},{id:7,name:'Pensión',icon:'👧'},{id:8,name:'Otros / Varios',icon:'📦'}],tx:[],income:[],debts:[],plans:[],fuel:[],maint:[],imports:[],settings:{utm:69542,extraCredits:0}};
const TAX=[{to:13.5,rate:0,rebate:0},{to:30,rate:.04,rebate:.54},{to:50,rate:.08,rebate:1.74},{to:70,rate:.135,rebate:4.49},{to:90,rate:.23,rebate:11.14},{to:120,rate:.304,rebate:17.8},{to:310,rate:.35,rebate:23.32},{to:Infinity,rate:.4,rebate:38.82}];
let state=load(),tab='panel',stage=[];
function $(id){return document.getElementById(id)}function clone(x){return JSON.parse(JSON.stringify(x))}
function load(){try{return Object.assign(clone(DEFAULT),JSON.parse(localStorage.getItem(KEY))||{})}catch(e){return clone(DEFAULT)}}
function save(msg='Guardado'){localStorage.setItem(KEY,JSON.stringify(state));render();toast(msg)}
function toast(t){let el=$('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function norm(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim()}
function money(n){return new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0}).format(Math.round(Number(n||0)))}
function num(v){let s=String(v??'').replace(/\s|\$|clp|CLP/g,'').trim();if(!s)return 0;let neg=/^-|\(|cargo|debe/i.test(s);s=s.replace(/[()]/g,'');if(s.includes(',')&&s.includes('.'))s=s.replace(/\./g,'').replace(',','.');else if(s.includes(',')&&!s.includes('.'))s=s.replace(',','.');else if((s.match(/\./g)||[]).length>0)s=s.replace(/\./g,'');let n=Number(s.replace(/[^0-9.-]/g,''))||0;return neg?-Math.abs(n):n}
function uid(){return Date.now()+Math.floor(Math.random()*999)}function today(){return new Date().toISOString().slice(0,10)}function ym(){return today().slice(0,7)}
function accountOptions(){return state.accounts.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('')}
function catOptions(){return state.cats.map(c=>`<option value="${c.id}">${esc(c.icon+' '+c.name)}</option>`).join('')}
function accName(id){return state.accounts.find(a=>a.id==id)?.name||'Sin cuenta'}function catName(id){return state.cats.find(c=>c.id==id)?.name||'Sin categoría'}
function adjustAccount(id,type,amount){let a=state.accounts.find(x=>x.id==id);if(!a)return;if(a.type==='credito')a.used=Math.max(0,Number(a.used||0)+(type==='gasto'?Math.abs(amount):-Math.abs(amount)));else a.balance=Number(a.balance||0)+(type==='ingreso'?Math.abs(amount):-Math.abs(amount))}
function totals(){let cash=state.accounts.filter(a=>a.type!=='credito').reduce((s,a)=>s+Number(a.balance||0),0),tc=state.accounts.filter(a=>a.type==='credito').reduce((s,a)=>s+Number(a.used||0),0),m=ym(),out=state.tx.filter(x=>x.type==='gasto'&&String(x.date).slice(0,7)===m).reduce((s,x)=>s+Number(x.amount||0),0),inc=state.income.filter(x=>String(x.date).slice(0,7)===m).reduce((s,x)=>s+Number(x.net||0),0);return{cash,tc,out,inc}}
function setTab(t){tab=t;TABS.forEach(x=>$('tab-'+x[0])?.classList.toggle('active',x[0]===t));$('title').textContent=TABS.find(x=>x[0]===t)?.[2]||'Finanzas';render()}
function init(){ $('tabs').innerHTML=TABS.map(t=>`<button class="tab ${t[0]===tab?'active':''}" id="tab-${t[0]}" onclick="setTab('${t[0]}')"><span>${t[1]}</span>${t[2]}</button>`).join(''); render() }
function render(){let fn={panel,registros,cuentas,categorias,vehiculo,planificar,deudas,ingresos,impuestos,importar,datos}[tab]||panel;$('main').innerHTML=fn()}
function txItem(x,del=false){return `<div class="item"><div><div class="name">${esc(x.desc||'Movimiento')}</div><div class="meta">${esc(x.date)} · ${esc(catName(x.catId))} · ${esc(accName(x.accountId))}</div></div><div class="amt ${x.type==='ingreso'?'green':'red'}">${x.type==='ingreso'?'+':'-'}${money(x.amount)}</div></div>${del?`<button class="btn danger" onclick="delTx(${x.id})">Eliminar</button>`:''}`}
function incomeSummary(){let y=new Date().getFullYear(),list=state.income.filter(i=>new Date(i.date).getFullYear()===y),gross=list.reduce((s,i)=>s+Number(i.gross||0),0),net=list.reduce((s,i)=>s+Number(i.net||0),0),pen=list.reduce((s,i)=>s+Number(i.pensionPayment||0),0),tax=list.reduce((s,i)=>s+Number(i.tax||0),0);return `<div class="grid"><div class="metric"><div class="label">Haberes año</div><div class="value blue">${money(gross)}</div></div><div class="metric"><div class="label">Líquido año</div><div class="value green">${money(net)}</div></div><div class="metric"><div class="label">Pensión pagada</div><div class="value amber">${money(pen)}</div></div><div class="metric"><div class="label">Impuesto retenido</div><div class="value red">${money(tax)}</div></div></div>`}
function panel(){let t=totals(),recent=[...state.tx].sort((a,b)=>String(b.date).localeCompare(String(a.date))).slice(0,6);return `<div class="grid"><div class="card metric"><div class="label">Saldo disponible</div><div class="value green">${money(t.cash)}</div></div><div class="card metric"><div class="label">Deuda tarjeta</div><div class="value red">${money(t.tc)}</div></div><div class="card metric"><div class="label">Ingresos mes</div><div class="value blue">${money(t.inc)}</div></div><div class="card metric"><div class="label">Gastos mes</div><div class="value amber">${money(t.out)}</div></div></div><div class="card warn"><div class="section-title">v3 importación</div><p class="mini">Ahora hay módulo Importar para Excel/CSV y PDF: movimientos, comprobantes de pensión y liquidaciones de sueldo. Todo se procesa localmente en Safari.</p></div><div class="card"><div class="section-title">Últimos movimientos</div><div class="list">${recent.length?recent.map(x=>txItem(x)).join(''):'<p class="mini">Sin movimientos todavía.</p>'}</div></div><div class="card"><div class="section-title">Resumen ingresos</div>${incomeSummary()}</div>`}
function registros(){return `<div class="card"><div class="section-title">Nuevo registro</div><div class="form"><div><label>Tipo</label><select id="txType"><option value="gasto">Gasto</option><option value="ingreso">Ingreso</option></select></div><div><label>Fecha</label><input id="txDate" type="date" value="${today()}"></div><div class="full"><label>Descripción</label><input id="txDesc" placeholder="Ej. supermercado, bencina, transferencia"></div><div><label>Monto</label><input id="txAmount" inputmode="numeric" placeholder="5.990"></div><div><label>Categoría</label><select id="txCat">${catOptions()}</select></div><div class="full"><label>Cuenta</label><select id="txAcc">${accountOptions()}</select></div></div><button class="btn" style="width:100%;margin-top:10px" onclick="addTx()">Guardar registro</button></div><div class="card"><div class="section-title">Registros</div><div class="list">${state.tx.length?[...state.tx].reverse().map(x=>txItem(x,true)).join(''):'<p class="mini">Sin registros.</p>'}</div></div>`}
function addTx(){let amount=Math.abs(num($('txAmount').value));if(!amount)return toast('Ingresa monto');let x={id:uid(),type:$('txType').value,date:$('txDate').value,desc:$('txDesc').value,amount,catId:$('txCat').value,accountId:$('txAcc').value};state.tx.push(x);adjustAccount(x.accountId,x.type,amount);save()}function delTx(id){state.tx=state.tx.filter(x=>x.id!==id);save('Eliminado')}
function cuentas(){return `<div class="card"><div class="section-title">Nueva cuenta</div><div class="form"><div class="full"><label>Nombre</label><input id="accName" placeholder="Banco, efectivo, tarjeta"></div><div><label>Tipo</label><select id="accType"><option value="corriente">Corriente</option><option value="ahorro">Ahorro</option><option value="credito">Crédito</option><option value="efectivo">Efectivo</option></select></div><div><label>Saldo / usado</label><input id="accBal" inputmode="numeric" placeholder="0"></div></div><button class="btn" style="width:100%;margin-top:10px" onclick="addAcc()">Agregar cuenta</button></div><div class="card"><div class="section-title">Cuentas</div><div class="list">${state.accounts.map(a=>`<div class="item"><div><div class="name">${esc(a.name)}</div><div class="meta">${esc(a.type)}</div></div><div class="amt ${a.type==='credito'?'red':'green'}">${money(a.type==='credito'?a.used:a.balance)}</div></div><button class="btn danger" onclick="delAcc(${a.id})">Eliminar</button>`).join('')}</div></div>`}
function addAcc(){let name=$('accName').value.trim();if(!name)return toast('Falta nombre');let type=$('accType').value,val=Math.abs(num($('accBal').value));state.accounts.push({id:uid(),name,type,balance:type==='credito'?0:val,used:type==='credito'?val:0,limit:0});save()}function delAcc(id){state.accounts=state.accounts.filter(a=>a.id!==id);save('Cuenta eliminada')}
function categorias(){return `<div class="card"><div class="section-title">Nueva categoría</div><div class="form"><div><label>Ícono</label><input id="catIcon" placeholder="🧾"></div><div><label>Nombre</label><input id="catName" placeholder="Ej. Regalos"></div></div><button class="btn" style="width:100%;margin-top:10px" onclick="addCat()">Agregar categoría</button></div><div class="card"><div class="section-title">Categorías</div><div class="list">${state.cats.map(c=>`<div class="item"><div><div class="name">${esc(c.icon)} ${esc(c.name)}</div><div class="meta">Usada en ${state.tx.filter(x=>x.catId==c.id).length} registros</div></div><button class="btn danger" onclick="delCat(${c.id})">Eliminar</button></div>`).join('')}</div></div>`}
function addCat(){let name=$('catName').value.trim();if(!name)return toast('Falta nombre');state.cats.push({id:uid(),name,icon:$('catIcon').value||'🧾'});save()}function delCat(id){state.cats=state.cats.filter(c=>c.id!==id);save('Categoría eliminada')}
function vehiculo(){let logs=[...state.fuel].sort((a,b)=>Number(b.km)-Number(a.km)),last=logs[0],prev=logs[1],diff=last&&prev?Number(last.km)-Number(prev.km):0,kml=last&&diff>0&&Number(last.liters)>0?diff/Number(last.liters):0;return `<div class="grid"><div class="card metric"><div class="label">Último rendimiento</div><div class="value green">${kml?kml.toFixed(1)+' km/L':'-'}</div></div><div class="card metric"><div class="label">Costos vehículo</div><div class="value red">${money(state.maint.reduce((s,m)=>s+Number(m.amount||0),0)+state.fuel.reduce((s,f)=>s+Number(f.amount||0),0))}</div></div></div><div class="card"><div class="section-title">Carga bencina</div><div class="form"><div><label>Fecha</label><input id="fuelDate" type="date" value="${today()}"></div><div><label>Kilometraje</label><input id="fuelKm" inputmode="numeric"></div><div><label>Litros</label><input id="fuelLiters" inputmode="decimal" placeholder="10,7"></div><div><label>Monto</label><input id="fuelAmount" inputmode="numeric"></div><div class="full"><label>Cuenta pago</label><select id="fuelAcc">${accountOptions()}</select></div></div><button class="btn" style="width:100%;margin-top:10px" onclick="addFuel()">Guardar y registrar gasto</button></div><div class="card"><div class="section-title">Historial</div><div class="list">${logs.length?logs.map(f=>`<div class="item"><div><div class="name">${esc(f.date)} · ${String(f.liters).replace('.',',')} L</div><div class="meta">Km ${Number(f.km).toLocaleString('es-CL')}</div></div><div class="amt red">${money(f.amount)}</div></div>`).join(''):'<p class="mini">Sin cargas.</p>'}</div></div>`}
function addFuel(){let amount=Math.abs(num($('fuelAmount').value)),km=Math.abs(num($('fuelKm').value)),liters=Math.abs(num($('fuelLiters').value));if(!amount||!km||!liters)return toast('Faltan datos');state.fuel.push({id:uid(),date:$('fuelDate').value,km,liters,amount});let tx={id:uid(),type:'gasto',date:$('fuelDate').value,desc:'Combustible vehículo',amount,catId:3,accountId:$('fuelAcc').value};state.tx.push(tx);adjustAccount(tx.accountId,'gasto',amount);save()}
function planificar(){return `<div class="card"><div class="section-title">Gasto planificado</div><div class="form"><div><label>Fecha</label><input id="pDate" type="date" value="${today()}"></div><div><label>Monto</label><input id="pAmount" inputmode="numeric"></div><div class="full"><label>Descripción</label><input id="pDesc" placeholder="Colegio, dividendo, regalo, cuenta"></div><div class="full"><label>Cuenta para pagar</label><select id="pAcc">${accountOptions()}</select></div></div><button class="btn" style="width:100%;margin-top:10px" onclick="addPlan()">Agregar planificado</button></div><div class="card"><div class="section-title">Pendientes</div><div class="list">${state.plans.length?state.plans.map(p=>`<div class="item"><div><div class="name">${esc(p.desc)}</div><div class="meta">${esc(p.date)} · ${esc(accName(p.accountId))}</div></div><div class="amt amber">${money(p.amount)}</div></div><div class="actions"><button class="btn green" onclick="payPlan(${p.id})">Pagar</button><button class="btn danger" onclick="delPlan(${p.id})">Eliminar</button></div>`).join(''):'<p class="mini">Sin planificados.</p>'}</div></div>`}
function addPlan(){let amount=Math.abs(num($('pAmount').value)),desc=$('pDesc').value;if(!amount||!desc)return toast('Faltan datos');state.plans.push({id:uid(),date:$('pDate').value,amount,desc,accountId:$('pAcc').value});save()}function payPlan(id){let p=state.plans.find(x=>x.id===id);if(!p)return;state.tx.push({id:uid(),type:'gasto',date:today(),desc:p.desc,amount:p.amount,catId:8,accountId:p.accountId});adjustAccount(p.accountId,'gasto',p.amount);state.plans=state.plans.filter(x=>x.id!==id);save('Pagado')}function delPlan(id){state.plans=state.plans.filter(x=>x.id!==id);save('Eliminado')}
function deudas(){return `<div class="card"><div class="section-title">Nueva deuda</div><div class="form"><div class="full"><label>Nombre</label><input id="dName" placeholder="Crédito, préstamo, tarjeta"></div><div><label>Saldo</label><input id="dBal" inputmode="numeric"></div><div><label>Cuota</label><input id="dPay" inputmode="numeric"></div></div><button class="btn" style="width:100%;margin-top:10px" onclick="addDebt()">Agregar deuda</button></div><div class="card"><div class="section-title">Deudas</div><div class="list">${state.debts.length?state.debts.map(d=>`<div class="item"><div><div class="name">${esc(d.name)}</div><div class="meta">Cuota ${money(d.payment)}</div></div><div class="amt red">${money(d.balance)}</div></div><button class="btn danger" onclick="delDebt(${d.id})">Eliminar</button>`).join(''):'<p class="mini">Sin deudas.</p>'}</div></div>`}
function addDebt(){let name=$('dName').value.trim();if(!name)return toast('Falta nombre');state.debts.push({id:uid(),name,balance:Math.abs(num($('dBal').value)),payment:Math.abs(num($('dPay').value))});save()}function delDebt(id){state.debts=state.debts.filter(d=>d.id!==id);save('Deuda eliminada')}
function ingresos(){return `<div class="card"><div class="section-title">Nuevo ingreso / liquidación</div><div class="form"><div><label>Tipo</label><select id="iType"><option value="sueldo">Sueldo</option><option value="bono">Bono</option><option value="pension">Pensión pagada</option><option value="otro">Otro ingreso</option></select></div><div><label>Fecha pago</label><input id="iDate" type="date" value="${today()}"></div><div class="full"><label>Descripción</label><input id="iDesc" placeholder="Sueldo abril, bono, pensión"></div><div><label>Total haberes</label><input id="iGross" inputmode="numeric"></div><div><label>Líquido</label><input id="iNet" inputmode="numeric"></div><div><label>AFP</label><input id="iAfp" inputmode="numeric"></div><div><label>Isapre/Salud</label><input id="iHealth" inputmode="numeric"></div><div><label>AFC</label><input id="iAfc" inputmode="numeric"></div><div><label>Impuesto</label><input id="iTax" inputmode="numeric"></div><div><label>Base tributable</label><input id="iTaxable" inputmode="numeric"></div><div><label>Pensión pagada</label><input id="iPension" inputmode="numeric"></div><div><label>Año renta</label><input id="iRentYear" inputmode="numeric" value="${new Date().getFullYear()}"></div></div><button class="btn" style="width:100%;margin-top:10px" onclick="addIncome()">Guardar ingreso</button></div><div class="card"><div class="section-title">Resumen</div>${incomeSummary()}</div><div class="card"><div class="section-title">Registros ingresos</div><div class="list">${state.income.length?[...state.income].reverse().map(i=>incomeItem(i,true)).join(''):'<p class="mini">Sin ingresos.</p>'}</div></div>`}
function incomeItem(i,del=false){return `<div class="item"><div><div class="name">${esc(i.desc||i.type)}</div><div class="meta">${esc(i.date)} · ${esc(i.type)} · Base ${money(i.taxable)} · Pensión ${money(i.pensionPayment)}</div></div><div class="amt green">${money(i.net||i.pensionPayment)}</div></div>${del?`<button class="btn danger" onclick="delIncome(${i.id})">Eliminar</button>`:''}`}
function addIncome(){let type=$('iType').value,net=Math.abs(num($('iNet').value)),gross=Math.abs(num($('iGross').value)),pension=Math.abs(num($('iPension').value));if(!net&&!gross&&!pension)return toast('Faltan montos');state.income.push({id:uid(),type,date:$('iDate').value,desc:$('iDesc').value||type,gross,net,afp:Math.abs(num($('iAfp').value)),health:Math.abs(num($('iHealth').value)),afc:Math.abs(num($('iAfc').value)),tax:Math.abs(num($('iTax').value)),taxable:Math.abs(num($('iTaxable').value))||gross,pensionPayment:pension,rentYear:Math.abs(num($('iRentYear').value))});save()}function delIncome(id){state.income=state.income.filter(i=>i.id!==id);save('Ingreso eliminado')}
function impuestos(){let y=new Date().getFullYear(),r=calcTax(y);return `<div class="card"><div class="section-title">Supuestos</div><div class="form"><div><label>Año renta</label><input id="taxYearInput" inputmode="numeric" value="${y}" oninput="refreshTaxBox()"></div><div><label>UTM diciembre</label><input id="utmVal" inputmode="numeric" value="${state.settings.utm}"></div><div class="full"><label>Créditos adicionales</label><input id="extraCredits" inputmode="numeric" value="${state.settings.extraCredits}"></div></div><button class="btn sec" style="width:100%;margin-top:10px" onclick="saveTaxSettings()">Guardar supuestos</button></div><div class="card"><div class="section-title">Impuesto estimado</div><div id="taxBox">${taxHtml(r,y)}</div></div><div class="card warn"><div class="section-title">Referencia</div><p class="mini">Cálculo orientativo de Global Complementario. Sirve para planificación, no reemplaza al SII.</p></div>`}
function calcTax(year){let list=state.income.filter(i=>Number(i.rentYear||new Date(i.date).getFullYear())===year),base=list.reduce((s,i)=>s+Number(i.taxable||0),0),ret=list.reduce((s,i)=>s+Number(i.tax||0),0),uta=Number(state.settings.utm||0)*12,baseUTA=uta?base/uta:0,row=TAX.find(r=>baseUTA<=r.to)||TAX[0],calc=Math.max(0,(baseUTA*row.rate-row.rebate)*uta),balance=calc-ret-Number(state.settings.extraCredits||0);return{base,ret,baseUTA,calc,balance}}
function taxHtml(r,y){return `<div class="grid"><div class="metric"><div class="label">Base tributable</div><div class="value blue">${money(r.base)}</div></div><div class="metric"><div class="label">Retenido</div><div class="value amber">${money(r.ret)}</div></div><div class="metric"><div class="label">Impuesto estimado</div><div class="value red">${money(r.calc)}</div></div><div class="metric"><div class="label">Pagar / recuperar</div><div class="value ${r.balance>0?'red':'green'}">${money(r.balance)}</div></div></div><p class="mini">Año renta ${y} · Base ${r.baseUTA.toFixed(2)} UTA</p>`}
function refreshTaxBox(){let y=Number($('taxYearInput').value)||new Date().getFullYear();$('taxBox').innerHTML=taxHtml(calcTax(y),y)}function saveTaxSettings(){state.settings.utm=Math.abs(num($('utmVal').value));state.settings.extraCredits=Math.abs(num($('extraCredits').value));save('Supuestos guardados')}
function importar(){return `<div class="card"><div class="section-title">Importar Excel / CSV / PDF</div><p class="mini">Lee cartolas, planillas de movimientos, comprobantes de pago de pensión y liquidaciones de sueldo. Primero muestra una vista previa; nada se guarda hasta presionar Importar.</p><div class="form"><div class="full"><label>Tipo de importación</label><select id="importKind"><option value="auto">Detectar automáticamente</option><option value="movimientos">Movimientos / cartola</option><option value="liquidacion">Liquidación sueldo / bono</option><option value="pension">Comprobante pago pensión</option></select></div><div><label>Cuenta por defecto</label><select id="importAcc">${accountOptions()}</select></div><div><label>Categoría por defecto</label><select id="importCat">${catOptions()}</select></div><label class="check full"><input type="checkbox" id="updAcc" checked> Actualizar saldos de cuentas al importar movimientos</label></div><div class="filebox" style="margin-top:10px"><input id="importFiles" type="file" accept=".xlsx,.xls,.csv,.pdf" multiple onchange="handleImportFiles(event)"><p class="mini">Selecciona uno o varios archivos</p></div></div><div class="card"><div class="row"><div class="section-title">Vista previa</div><span class="badge">${stage.length} detectados</span></div><div id="stageBox">${stageHtml()}</div>${stage.length?`<div class="actions"><button class="btn green" onclick="commitStage()">Importar seleccionados</button><button class="btn danger" onclick="stage=[];render()">Descartar</button></div>`:''}</div><div class="card warn"><div class="section-title">PDF escaneado</div><p class="mini">Si el PDF es una foto/escaneo y no tiene texto interno, esta versión no lo leerá. En ese caso necesitaríamos agregar OCR en una etapa posterior.</p></div>`}
function stageHtml(){if(!stage.length)return '<p class="mini">Aún no hay archivos cargados.</p>';return `<div class="preview list">${stage.map((r,i)=>`<div><div class="item"><div><div class="name">${esc(r.desc||r.file||r.kind)}</div><div class="meta">${esc(r.date||'sin fecha')} · ${esc(r.kind)} · ${esc(r.source||'')}</div><div class="meta">${esc(r.note||'')}</div></div><div class="amt ${r.type==='ingreso'||r.kind==='liquidacion'?'green':'red'}">${money(r.amount||r.net||r.pensionPayment||r.gross)}</div></div><label class="check"><input type="checkbox" id="st${i}" checked> importar este registro</label></div>`).join('')}</div>`}
async function handleImportFiles(e){let files=[...e.target.files];if(!files.length)return;stage=[];for(const f of files){try{if(/\.pdf$/i.test(f.name))await readPdfFile(f);else await readSheetFile(f)}catch(err){stage.push({kind:'error',file:f.name,desc:'No se pudo leer',note:String(err.message||err),amount:0,source:f.name})}}render();toast(stage.length+' registros detectados')}
async function readSheetFile(file){if(!window.XLSX){stage.push({kind:'error',file:file.name,desc:'Falta librería Excel',note:'No se cargó xlsx.full.min.js',amount:0,source:file.name});return}let buf=await file.arrayBuffer(),wb=XLSX.read(buf,{type:'array',cellDates:true}),ws=wb.Sheets[wb.SheetNames[0]],rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});let kind=$('importKind')?.value||'auto';for(const row of rows){let obj=mapSheetRow(row,kind,file.name);if(obj)stage.push(obj)}}
function h(row,names){let keys=Object.keys(row),found=keys.find(k=>names.some(n=>norm(k).includes(n)));return found?row[found]:''}
function mapSheetRow(row,kind,file){let txt=norm(Object.values(row).join(' '));let date=parseDate(h(row,['fecha','date','fec'])||Object.values(row).find(v=>parseDate(v))||today());let desc=h(row,['descripcion','descripción','glosa','detalle','comercio','nombre','concepto'])||'Importado Excel';let cargo=num(h(row,['cargo','debe','egreso','gasto','retiro']));let abono=num(h(row,['abono','haber','ingreso','deposito','depósito']));let monto=num(h(row,['monto','importe','valor','total']));let target=kind==='auto'?(txt.includes('liquido')||txt.includes('haberes')?'liquidacion':txt.includes('pension')?'pension':'movimientos'):kind;if(target==='liquidacion'){let gross=Math.abs(num(h(row,['haberes','total haberes','bruto','gross']))||monto),net=Math.abs(num(h(row,['liquido','líquido','neto','net']))||abono),tax=Math.abs(num(h(row,['impuesto','retenido']))),pension=Math.abs(num(h(row,['pension','pensión pagada'])));return{kind:'liquidacion',source:file,date,desc,amount:net,net,gross,tax,taxable:Math.abs(num(h(row,['base','tributable','imponible'])))||gross,pensionPayment:pension,type:'ingreso',note:'Detectado desde Excel'}}if(target==='pension'){let amount=Math.abs(monto||cargo||abono);return{kind:'pension',source:file,date,desc:desc||'Pago pensión',amount,pensionPayment:amount,type:'gasto',note:'Comprobante/planilla pensión'}}let amount=Math.abs(cargo||abono||monto);if(!amount)return null;let type=(abono>0||monto<0&&String(h(row,['tipo'])).toLowerCase().includes('ingreso'))?'ingreso':'gasto';if(cargo>0)type='gasto';return{kind:'movimiento',source:file,date,desc,amount,type,catId:$('importCat')?.value||8,accountId:$('importAcc')?.value||1,note:'Detectado desde Excel/CSV'}}
async function readPdfFile(file){if(!window.pdfjsLib){stage.push({kind:'error',file:file.name,desc:'Falta librería PDF',note:'No se cargó pdf.min.js',amount:0,source:file.name});return}let data=new Uint8Array(await file.arrayBuffer()),pdf=await pdfjsLib.getDocument({data}).promise,text='';for(let p=1;p<=pdf.numPages;p++){let page=await pdf.getPage(p),tc=await page.getTextContent();text+=' '+tc.items.map(i=>i.str).join(' ')}parsePdfText(text,file.name)}
function parsePdfText(text,file){let n=norm(text),kind=$('importKind')?.value||'auto';if(kind==='auto'){if(n.includes('liquidacion')||n.includes('liquido a pago')||n.includes('haberes'))kind='liquidacion';else if(n.includes('pension')||n.includes('pensión')||n.includes('alimentos'))kind='pension';else kind='movimientos'}let date=parseDate(text)||today(),amount=largestAmount(text);if(kind==='liquidacion'){let gross=amountNear(text,['total haberes','haberes','bruto'])||amount,net=amountNear(text,['líquido a pago','liquido a pago','líquido','liquido','neto'])||amount,tax=amountNear(text,['impuesto','impto','retenido'])||0,afp=amountNear(text,['afp'])||0,health=amountNear(text,['isapre','salud'])||0;stage.push({kind:'liquidacion',source:file,date,desc:'Liquidación importada',amount:net,net,gross,tax,afp,health,taxable:gross,type:'ingreso',note:snippet(text)});return}if(kind==='pension'){stage.push({kind:'pension',source:file,date,desc:'Pago pensión importado',amount,pensionPayment:amount,type:'gasto',note:snippet(text)});return}stage.push({kind:'movimiento',source:file,date,desc:'Comprobante importado',amount,type:'gasto',catId:$('importCat')?.value||8,accountId:$('importAcc')?.value||1,note:snippet(text)})}
function parseDate(v){let s=String(v||'');let d=s.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);if(d)return `${d[1]}-${String(d[2]).padStart(2,'0')}-${String(d[3]).padStart(2,'0')}`;d=s.match(/(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})/);if(d){let y=d[3].length===2?'20'+d[3]:d[3];return `${y}-${String(d[2]).padStart(2,'0')}-${String(d[1]).padStart(2,'0')}`}let dt=new Date(s);return isNaN(dt)?'':dt.toISOString().slice(0,10)}
function largestAmount(text){let arr=[...String(text).matchAll(/\$?\s?\d{1,3}(?:\.\d{3})+(?:,\d+)?|\$?\s?\d{5,}/g)].map(m=>Math.abs(num(m[0]))).filter(n=>n>999);return arr.length?Math.max(...arr):0}
function amountNear(text,labels){let lower=norm(text);for(const lab of labels){let i=lower.indexOf(norm(lab));if(i>=0){let part=text.slice(Math.max(0,i),i+160),a=largestAmount(part);if(a)return a}}return 0}
function snippet(t){return String(t||'').replace(/\s+/g,' ').trim().slice(0,180)}
function commitStage(){let acc=$('importAcc')?.value||1,cat=$('importCat')?.value||8,upd=$('updAcc')?.checked!==false,count=0;stage.forEach((r,i)=>{let cb=$('st'+i);if(cb&&!cb.checked)return;if(r.kind==='liquidacion'){state.income.push({id:uid(),type:'sueldo',date:r.date,desc:r.desc||'Liquidación importada',gross:Math.abs(r.gross||0),net:Math.abs(r.net||r.amount||0),afp:Math.abs(r.afp||0),health:Math.abs(r.health||0),afc:Math.abs(r.afc||0),tax:Math.abs(r.tax||0),taxable:Math.abs(r.taxable||r.gross||0),pensionPayment:Math.abs(r.pensionPayment||0),rentYear:new Date(r.date).getFullYear()});count++;return}if(r.kind==='pension'){let amount=Math.abs(r.pensionPayment||r.amount||0);state.income.push({id:uid(),type:'pension',date:r.date,desc:r.desc||'Pago pensión',gross:0,net:0,taxable:0,tax:0,pensionPayment:amount,rentYear:new Date(r.date).getFullYear()});let tx={id:uid(),type:'gasto',date:r.date,desc:r.desc||'Pago pensión',amount,catId:7,accountId:acc};state.tx.push(tx);if(upd)adjustAccount(acc,'gasto',amount);count++;return}let amount=Math.abs(r.amount||0);if(!amount)return;let tx={id:uid(),type:r.type||'gasto',date:r.date||today(),desc:r.desc||'Movimiento importado',amount,catId:r.catId||cat,accountId:r.accountId||acc};state.tx.push(tx);if(upd)adjustAccount(tx.accountId,tx.type,amount);count++});state.imports.push({id:uid(),date:today(),count});stage=[];save(count+' registros importados')}
function datos(){return `<div class="card"><div class="section-title">Datos locales</div><p class="mini">Tus datos quedan guardados en este Safari/localStorage. GitHub solo contiene el código.</p><div class="list"><div class="item"><div><div class="name">Movimientos</div><div class="meta">Registros financieros</div></div><div class="amt">${state.tx.length}</div></div><div class="item"><div><div class="name">Ingresos</div><div class="meta">Liquidaciones, bonos y pensión</div></div><div class="amt">${state.income.length}</div></div><div class="item"><div><div class="name">Importaciones</div><div class="meta">Lotes importados</div></div><div class="amt">${state.imports.length}</div></div></div><div class="actions"><button class="btn sec" onclick="exportJson()">Exportar JSON</button><button class="btn sec" onclick="jsonFile.click()">Importar JSON</button></div><button class="btn danger" style="width:100%;margin-top:9px" onclick="resetAll()">Limpiar app</button></div><div class="card warn"><div class="section-title">Pendiente posterior</div><p class="mini">Agregar reglas de clasificación masiva: nana→hogar, regalo→regalos, deuda papá→deuda, y validación avanzada por cartola bancaria.</p></div>`}
function exportJson(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='finanzas-v3-respaldo.json';a.click();URL.revokeObjectURL(a.href)}
$('jsonFile').onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{state=Object.assign(clone(DEFAULT),JSON.parse(r.result));save('JSON importado')}catch(err){toast('JSON inválido')}};r.readAsText(f)}
function resetAll(){if(confirm('¿Limpiar todos los datos de prueba?')){state=clone(DEFAULT);stage=[];save('App limpia')}}
init();
</script>
</body>
</html>
