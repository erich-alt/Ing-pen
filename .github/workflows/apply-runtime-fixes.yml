name: Apply runtime fixes

on:
  workflow_dispatch:
  push:
    paths:
      - 'fixes.js'
      - '.github/workflows/apply-runtime-fixes.yml'

permissions:
  contents: write

jobs:
  apply-fixes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index and service worker
        run: |
          python3 - <<'PY'
          from pathlib import Path
          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          tag = '  <script src="fixes.js"></script>\n'
          if 'fixes.js' not in text:
              if '</body>' in text:
                  text = text.replace('</body>', tag + '</body>')
              else:
                  text += '\n' + tag
              index.write_text(text, encoding='utf-8')

          sw = Path('sw.js')
          sw.write_text("""const CACHE_NAME = 'control-ingresos-offline-v2';
const ASSETS = [
  './',
  './index.html',
  './fixes.js',
  './manifest.webmanifest',
  './icon-180.png',
  './icon-192.png',
  './icon-512.png',
  './vendor/xlsx.full.min.js',
  './vendor/pdf.min.js',
  './vendor/pdf.worker.min.js'
];

self.addEventListener('install', (event) => {
  event.waitUntil(caches.open(CACHE_NAME).then((cache) => cache.addAll(ASSETS)));
  self.skipWaiting();
});

self.addEventListener('activate', (event) => {
  event.waitUntil(
    caches.keys().then((keys) => Promise.all(
      keys.filter((key) => key !== CACHE_NAME).map((key) => caches.delete(key))
    ))
  );
  self.clients.claim();
});

self.addEventListener('fetch', (event) => {
  if (event.request.method !== 'GET') return;
  event.respondWith(
    caches.match(event.request).then((cached) => cached || fetch(event.request).then((response) => {
      const copy = response.clone();
      caches.open(CACHE_NAME).then((cache) => cache.put(event.request, copy));
      return response;
    }).catch(() => caches.match('./index.html')))
  );
});
""", encoding='utf-8')
          PY
      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js
          git diff --cached --quiet || git commit -m "Apply runtime fixes to app"
          git push
