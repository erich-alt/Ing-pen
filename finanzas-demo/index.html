<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f4f6fb" />
  <title>Finanzas Demo</title>
  <style>
    :root{--bg:#f4f6fb;--card:#fff;--ink:#172033;--muted:#697086;--line:#e5e9f2;--blue:#315efb;--green:#16a06d;--red:#d9435e;--amber:#b7791f;--soft:#eef3ff;--shadow:0 10px 28px rgba(25,35,60,.08)}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}
    .app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:92px}.top{position:sticky;top:0;z-index:5;background:rgba(244,246,251,.94);backdrop-filter:blur(16px);padding:max(14px,env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid var(--line)}
    h1{margin:0;font-size:25px;letter-spacing:-.04em}.sub{margin:4px 0 0;color:var(--muted);font-size:12px}.row{display:flex;gap:10px;align-items:center;justify-content:space-between}.pill{padding:7px 10px;border-radius:999px;background:var(--soft);font-size:11px;font-weight:800;color:var(--blue)}
    main{padding:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:var(--shadow);margin-bottom:12px}.metric{min-height:94px}.label{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:800}.value{margin-top:10px;font-size:22px;line-height:1;font-weight:900;word-break:break-word}.green{color:var(--green)}.red{color:var(--red)}.blue{color:var(--blue)}.amber{color:var(--amber)}
    .tabs{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:520px;display:grid;grid-template-columns:repeat(6,1fr);gap:2px;padding:7px 7px max(9px,env(safe-area-inset-bottom));background:rgba(255,255,255,.96);border-top:1px solid var(--line);backdrop-filter:blur(16px);z-index:10}.tab{border:0;background:transparent;border-radius:14px;min-height:54px;color:var(--muted);font:inherit;font-size:9px;font-weight:800}.tab span{display:block;font-size:21px;margin-bottom:2px}.tab.active{background:var(--soft);color:var(--blue)}
    button,input,select,textarea{font:inherit} input,select,textarea{width:100%;min-height:42px;border:1px solid var(--line);border-radius:13px;background:#fbfcff;padding:10px;color:var(--ink)} label{display:block;margin:0 0 5px;font-size:11px;color:var(--muted);font-weight:800}.form{display:grid;grid-template-columns:1fr 1fr;gap:9px}.full{grid-column:1/-1}.btn{border:0;border-radius:13px;min-height:43px;padding:10px 12px;background:var(--blue);color:#fff;font-weight:900}.btn.sec{background:#eef3ff;color:var(--blue);border:1px solid #dbe4ff}.btn.danger{background:#fff0f2;color:var(--red);border:1px solid #ffd2da}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}.list{display:grid;gap:8px}.item{display:grid;grid-template-columns:1fr auto;gap:8px;padding:11px;border:1px solid var(--line);border-radius:14px;background:#fbfcff}.name{font-weight:850}.meta{margin-top:3px;font-size:12px;color:var(--muted)}.amt{font-weight:950;text-align:right}.mini{font-size:11px;color:var(--muted);line-height:1.45}.hidden{display:none!important}.warn{background:#fff9ed;border-color:#f5ddb3}.hr{height:1px;background:var(--line);margin:12px 0}.toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%);background:#172033;color:#fff;border-radius:999px;padding:10px 14px;font-size:12px;font-weight:800;opacity:0;pointer-events:none;transition:.2s;z-index:20}.toast.show{opacity:1}.section-title{font-size:17px;font-weight:900;margin:0 0 11px}
  </style>
</head>
<body>
<div class="app">
  <header class="top"><div class="row"><div><h1 id="title">Finanzas</h1><p class="sub">Demo sanitizada para probar en iPhone</p></div><div class="pill">LOCAL</div></div></header>
  <main>
    <section id="view-dashboard"></section>
    <section id="view-movimientos" class="hidden"></section>
    <section id="view-cuentas" class="hidden"></section>
    <section id="view-deudas" class="hidden"></section>
    <section id="view-ingresos" class="hidden"></section>
    <section id="view-datos" class="hidden"></section>
  </main>
  <nav class="tabs">
    <button class="tab active" data-tab="dashboard"><span>🏠</span>Hoy</button>
    <button class="tab" data-tab="movimientos"><span>↕️</span>Movs</button>
    <button class="tab" data-tab="cuentas"><span>🏦</span>Ctas</button>
    <button class="tab" data-tab="deudas"><span>💳</span>Deuda</button>
    <button class="tab" data-tab="ingresos"><span>💰</span>Ingresos</button>
    <button class="tab" data-tab="datos"><span>⚙️</span>Datos</button>
  </nav>
</div>
<div id="toast" class="toast"></div>
<input id="importFile" class="hidden" type="file" accept="application/json,.json" />
<script>
const KEY='finanzas_demo_sanitizada_v1';
const CLP=n=>new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0}).format(Number(n||0));
const today=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now()+Math.floor(Math.random()*999);
const empty={accounts:[{id:1,name:'Cuenta Corriente',type:'corriente',balance:0},{id:2,name:'Cuenta Ahorro',type:'ahorro',balance:0},{id:3,name:'Tarjeta Crédito',type:'credito',limit:1000000,used:0}],tx:[],debts:[],income:[]};
let state=load();let current='dashboard';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||structuredClone(empty)}catch(e){return structuredClone(empty)}}
function save(){localStorage.setItem(KEY,JSON.stringify(state));render();toast('Guardado en este iPhone')}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function setTab(tab){current=tab;document.querySelectorAll('section[id^="view-"]').forEach(s=>s.classList.add('hidden'));document.getElementById('view-'+tab).classList.remove('hidden');document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.getElementById('title').textContent={dashboard:'Finanzas',movimientos:'Movimientos',cuentas:'Cuentas',deudas:'Deudas',ingresos:'Ingresos',datos:'Datos'}[tab];render()}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
function totals(){const cash=state.accounts.filter(a=>a.type!=='credito').reduce((s,a)=>s+Number(a.balance||0),0);const tc=state.accounts.filter(a=>a.type==='credito').reduce((s,a)=>s+Number(a.used||0),0);const debt=state.debts.reduce((s,d)=>s+Number(d.balance||0),0);const month=new Date().toISOString().slice(0,7);const inc=state.income.filter(i=>String(i.date).slice(0,7)===month).reduce((s,i)=>s+Number(i.net||0),0);const out=state.tx.filter(t=>String(t.date).slice(0,7)===month&&t.kind==='gasto').reduce((s,t)=>s+Number(t.amount||0),0);return{cash,tc,debt,inc,out,month}}
function render(){renderDashboard();renderMovs();renderAccounts();renderDebts();renderIncome();renderData()}
function renderDashboard(){const t=totals();const recent=[...state.tx].sort((a,b)=>String(b.date).localeCompare(String(a.date))).slice(0,6);document.getElementById('view-dashboard').innerHTML=`
<div class="grid"><div class="card metric"><div class="label">Saldo disponible</div><div class="value green">${CLP(t.cash)}</div></div><div class="card metric"><div class="label">Deuda tarjeta</div><div class="value red">${CLP(t.tc)}</div></div><div class="card metric"><div class="label">Ingresos mes</div><div class="value blue">${CLP(t.inc)}</div></div><div class="card metric"><div class="label">Gastos mes</div><div class="value amber">${CLP(t.out)}</div></div></div>
<div class="card warn"><div class="section-title">Prueba segura</div><p class="mini">Esta versión está sanitizada: no incluye tus transacciones, saldos ni datos reales. Sirve para probar botones, navegación móvil y guardado local antes de fusionarla con Ingresos/Pensión.</p></div>
<div class="card"><div class="section-title">Últimos movimientos</div><div class="list">${recent.length?recent.map(txItem).join(''):'<p class="mini">Aún no hay movimientos. Agrega uno en la pestaña Movs.</p>'}</div></div>
<div class="card"><div class="section-title">Integración</div><p class="mini">Siguiente paso: unir esta estructura con la app de ingresos para tener una sola PWA con módulos Finanzas + Ingresos + Impuestos + Deudas + Vehículos.</p></div>`}
function txItem(x){return `<div class="item"><div><div class="name">${esc(x.desc||'Movimiento')}</div><div class="meta">${esc(x.date)} · ${esc(x.category||'Sin categoría')} · ${esc(x.account||'')}</div></div><div class="amt ${x.kind==='ingreso'?'green':'red'}">${x.kind==='ingreso'?'+':'-'}${CLP(x.amount)}</div></div>`}
function renderMovs(){document.getElementById('view-movimientos').innerHTML=`<div class="card"><div class="section-title">Nuevo movimiento</div><div class="form"><div><label>Tipo</label><select id="txKind"><option value="gasto">Gasto</option><option value="ingreso">Ingreso</option></select></div><div><label>Fecha</label><input id="txDate" type="date" value="${today()}"></div><div class="full"><label>Descripción</label><input id="txDesc" placeholder="Ej. supermercado, bencina, transferencia"></div><div><label>Monto</label><input id="txAmount" type="number" inputmode="numeric" placeholder="0"></div><div><label>Categoría</label><input id="txCat" placeholder="Hogar, Auto, Niños..."></div><div class="full"><label>Cuenta</label><select id="txAccount">${state.accounts.map(a=>`<option>${esc(a.name)}</option>`).join('')}</select></div></div><button class="btn" style="width:100%;margin-top:10px" onclick="addTx()">Guardar movimiento</button></div><div class="card"><div class="section-title">Movimientos</div><div class="list">${state.tx.length?state.tx.slice().reverse().map(x=>txItem(x)+`<button class="btn danger" onclick="delTx(${x.id})">Eliminar</button>`).join(''):'<p class="mini">Sin movimientos.</p>'}</div></div>`}
function addTx(){const amount=Number(document.getElementById('txAmount').value||0);if(!amount)return toast('Ingresa un monto');const account=document.getElementById('txAccount').value;const kind=document.getElementById('txKind').value;state.tx.push({id:uid(),kind,date:document.getElementById('txDate').value,desc:document.getElementById('txDesc').value,amount,category:document.getElementById('txCat').value,account});const acc=state.accounts.find(a=>a.name===account);if(acc){if(acc.type==='credito'&&kind==='gasto')acc.used=Number(acc.used||0)+amount;else acc.balance=Number(acc.balance||0)+(kind==='ingreso'?amount:-amount)}save();}
function delTx(id){state.tx=state.tx.filter(x=>x.id!==id);save()}
function renderAccounts(){document.getElementById('view-cuentas').innerHTML=`<div class="card"><div class="section-title">Nueva cuenta</div><div class="form"><div class="full"><label>Nombre</label><input id="accName" placeholder="Cuenta, tarjeta, efectivo"></div><div><label>Tipo</label><select id="accType"><option value="corriente">Corriente</option><option value="ahorro">Ahorro</option><option value="credito">Crédito</option><option value="efectivo">Efectivo</option></select></div><div><label>Saldo / usado</label><input id="accBal" type="number" inputmode="numeric" placeholder="0"></div></div><button class="btn" style="width:100%;margin-top:10px" onclick="addAcc()">Agregar cuenta</button></div><div class="card"><div class="section-title">Cuentas</div><div class="list">${state.accounts.map(a=>`<div class="item"><div><div class="name">${esc(a.name)}</div><div class="meta">${esc(a.type)}</div></div><div class="amt ${a.type==='credito'?'red':'green'}">${CLP(a.type==='credito'?a.used:a.balance)}</div></div><button class="btn danger" onclick="delAcc(${a.id})">Eliminar</button>`).join('')}</div></div>`}
function addAcc(){const name=document.getElementById('accName').value.trim();if(!name)return toast('Falta nombre');const type=document.getElementById('accType').value;const val=Number(document.getElementById('accBal').value||0);state.accounts.push({id:uid(),name,type,balance:type==='credito'?0:val,used:type==='credito'?val:0,limit:0});save()}
function delAcc(id){state.accounts=state.accounts.filter(a=>a.id!==id);save()}
function renderDebts(){document.getElementById('view-deudas').innerHTML=`<div class="card"><div class="section-title">Nueva deuda</div><div class="form"><div class="full"><label>Nombre</label><input id="debtName" placeholder="Crédito, préstamo, tarjeta"></div><div><label>Saldo</label><input id="debtBal" type="number" inputmode="numeric"></div><div><label>Cuota</label><input id="debtPay" type="number" inputmode="numeric"></div></div><button class="btn" style="width:100%;margin-top:10px" onclick="addDebt()">Agregar deuda</button></div><div class="card"><div class="section-title">Deudas</div><div class="list">${state.debts.length?state.debts.map(d=>`<div class="item"><div><div class="name">${esc(d.name)}</div><div class="meta">Cuota ${CLP(d.payment)}</div></div><div class="amt red">${CLP(d.balance)}</div></div><button class="btn danger" onclick="delDebt(${d.id})">Eliminar</button>`).join(''):'<p class="mini">Sin deudas registradas.</p>'}</div></div>`}
function addDebt(){const name=document.getElementById('debtName').value.trim();if(!name)return toast('Falta nombre');state.debts.push({id:uid(),name,balance:Number(document.getElementById('debtBal').value||0),payment:Number(document.getElementById('debtPay').value||0)});save()}
function delDebt(id){state.debts=state.debts.filter(d=>d.id!==id);save()}
function renderIncome(){document.getElementById('view-ingresos').innerHTML=`<div class="card"><div class="section-title">Ingreso rápido</div><div class="form"><div><label>Fecha</label><input id="incDate" type="date" value="${today()}"></div><div><label>Líquido</label><input id="incNet" type="number" inputmode="numeric"></div><div><label>Haberes</label><input id="incGross" type="number" inputmode="numeric"></div><div><label>Pensión</label><input id="incPension" type="number" inputmode="numeric"></div><div class="full"><label>Descripción</label><input id="incDesc" placeholder="Sueldo, bono, asesoría"></div></div><button class="btn" style="width:100%;margin-top:10px" onclick="addIncome()">Guardar ingreso</button><div class="hr"></div><a class="btn sec" style="display:block;text-align:center;text-decoration:none" href="../launcher.html">Abrir app Ingresos/Pensión actual</a></div><div class="card"><div class="section-title">Ingresos registrados</div><div class="list">${state.income.length?state.income.slice().reverse().map(i=>`<div class="item"><div><div class="name">${esc(i.desc||'Ingreso')}</div><div class="meta">${esc(i.date)} · Haberes ${CLP(i.gross)} · Pensión ${CLP(i.pension)}</div></div><div class="amt green">${CLP(i.net)}</div></div><button class="btn danger" onclick="delIncome(${i.id})">Eliminar</button>`).join(''):'<p class="mini">Sin ingresos.</p>'}</div></div>`}
function addIncome(){const net=Number(document.getElementById('incNet').value||0);if(!net)return toast('Ingresa líquido');state.income.push({id:uid(),date:document.getElementById('incDate').value,net,gross:Number(document.getElementById('incGross').value||0),pension:Number(document.getElementById('incPension').value||0),desc:document.getElementById('incDesc').value});save()}
function delIncome(id){state.income=state.income.filter(i=>i.id!==id);save()}
function renderData(){document.getElementById('view-datos').innerHTML=`<div class="card"><div class="section-title">Datos locales</div><p class="mini">Todo lo que ingreses en esta demo queda guardado en localStorage de este navegador. No se sube a GitHub ni a la nube.</p><div class="hr"></div><div class="list"><div class="item"><div><div class="name">Movimientos</div><div class="meta">Registros de gasto/ingreso</div></div><div class="amt">${state.tx.length}</div></div><div class="item"><div><div class="name">Cuentas</div><div class="meta">Cuentas y tarjetas</div></div><div class="amt">${state.accounts.length}</div></div><div class="item"><div><div class="name">Ingresos</div><div class="meta">Sueldos/bonos rápidos</div></div><div class="amt">${state.income.length}</div></div></div><div class="actions"><button class="btn sec" onclick="exportData()">Exportar JSON</button><button class="btn sec" onclick="document.getElementById('importFile').click()">Importar JSON</button></div><button class="btn danger" style="width:100%;margin-top:9px" onclick="resetData()">Limpiar demo</button></div><div class="card warn"><div class="section-title">GitHub</div><p class="mini">Esta carpeta es solo una demo sanitizada para probar desde iPhone. El código original con tus datos reales no se subió.</p></div>`}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='finanzas-demo-respaldo.json';a.click();URL.revokeObjectURL(a.href)}
document.getElementById('importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save()}catch(err){toast('JSON inválido')}};r.readAsText(f)};
function resetData(){if(confirm('¿Limpiar todos los datos de prueba?')){state=structuredClone(empty);save()}}
render();
</script>
</body>
</html>
