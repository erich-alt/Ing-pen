<!doctype html>
<html lang='es'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1, viewport-fit=cover'>
<meta name='apple-mobile-web-app-capable' content='yes'>
<meta name='apple-mobile-web-app-status-bar-style' content='default'>
<meta name='theme-color' content='#f4f6fb'>
<title>Finanzas Integrada</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#172033;--muted:#697086;--line:#e5e9f2;--blue:#315efb;--green:#16a06d;--red:#d9435e;--amber:#b7791f;--purple:#7c4dff;--soft:#eef3ff;--shadow:0 10px 28px rgba(25,35,60,.08)}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;color:var(--ink)}.app{max-width:540px;margin:0 auto;min-height:100vh;padding-bottom:98px}.top{position:sticky;top:0;z-index:5;background:rgba(244,246,251,.95);backdrop-filter:blur(16px);padding:max(14px,env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid var(--line)}h1{margin:0;font-size:25px;letter-spacing:-.04em}.sub{margin:4px 0 0;color:var(--muted);font-size:12px}.row{display:flex;gap:10px;align-items:center;justify-content:space-between}.pill{padding:7px 10px;border-radius:999px;background:var(--soft);font-size:11px;font-weight:800;color:var(--blue)}main{padding:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:var(--shadow);margin-bottom:12px}.metric{min-height:94px}.label{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:800}.value{margin-top:10px;font-size:21px;line-height:1;font-weight:900;word-break:break-word}.green{color:var(--green)}.red{color:var(--red)}.blue{color:var(--blue)}.amber{color:var(--amber)}.purple{color:var(--purple)}button,input,select,textarea{font:inherit}input,select,textarea{width:100%;min-height:42px;border:1px solid var(--line);border-radius:13px;background:#fbfcff;padding:10px;color:var(--ink)}label{display:block;margin:0 0 5px;font-size:11px;color:var(--muted);font-weight:800}.form{display:grid;grid-template-columns:1fr 1fr;gap:9px}.full{grid-column:1/-1}.btn{border:0;border-radius:13px;min-height:42px;padding:10px 12px;background:var(--blue);color:#fff;font-weight:900}.btn.sec{background:#eef3ff;color:var(--blue);border:1px solid #dbe4ff}.btn.danger{background:#fff0f2;color:var(--red);border:1px solid #ffd2da}.btn.green{background:#eafaf3;color:var(--green);border:1px solid #c9f2df}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}.list{display:grid;gap:8px}.item{display:grid;grid-template-columns:1fr auto;gap:8px;padding:11px;border:1px solid var(--line);border-radius:14px;background:#fbfcff}.name{font-weight:850}.meta{margin-top:3px;font-size:12px;color:var(--muted);line-height:1.35}.amt{font-weight:950;text-align:right}.mini{font-size:12px;color:var(--muted);line-height:1.45}.hidden{display:none!important}.warn{background:#fff9ed;border-color:#f5ddb3}.hr{height:1px;background:var(--line);margin:12px 0}.tabs{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:540px;display:flex;gap:4px;overflow-x:auto;padding:7px 7px max(9px,env(safe-area-inset-bottom));background:rgba(255,255,255,.97);border-top:1px solid var(--line);backdrop-filter:blur(16px);z-index:10}.tab{border:0;background:transparent;border-radius:14px;min-width:68px;min-height:54px;color:var(--muted);font-size:9px;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center}.tab span{font-size:21px;margin-bottom:2px}.tab.active{background:var(--soft);color:var(--blue)}.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#172033;color:#fff;border-radius:999px;padding:10px 14px;font-size:12px;font-weight:800;opacity:0;pointer-events:none;transition:.2s;z-index:20}.toast.show{opacity:1}.section-title{font-size:17px;font-weight:900;margin:0 0 11px}.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}.chip{border:1px solid var(--line);background:#fff;color:var(--muted);padding:8px 10px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap}.chip.active{background:var(--soft);border-color:#dbe4ff;color:var(--blue)}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid var(--line);font-size:12px;text-align:right}th:first-child,td:first-child{text-align:left}.table{overflow:auto}.small{font-size:11px}.check{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--muted);font-weight:800}.check input{width:auto;min-height:auto}
</style>
</head>
<body>
<div class='app'>
<header class='top'><div class='row'><div><h1 id='title'>Panel</h1><p class='sub'>Finanzas + Ingresos/Pensión en una sola app local</p></div><div class='pill'>LOCAL</div></div></header>
<main>
<section id='view-panel'></section><section id='view-registros' class='hidden'></section><section id='view-cuentas' class='hidden'></section><section id='view-categorias' class='hidden'></section><section id='view-vehiculo' class='hidden'></section><section id='view-planificar' class='hidden'></section><section id='view-deudas' class='hidden'></section><section id='view-ingresos' class='hidden'></section><section id='view-impuestos' class='hidden'></section><section id='view-datos' class='hidden'></section>
</main>
<nav class='tabs' id='tabs'></nav>
</div>
<div id='toast' class='toast'></div><input id='importFile' class='hidden' type='file' accept='application/json,.json'>
<script>
const KEY='finanzas_integrada_v2';
const TABS=[['panel','💲','Panel'],['registros','🕐','Registros'],['cuentas','🏦','Cuentas'],['categorias','🗂️','Categorías'],['vehiculo','⛽','Vehículo'],['planificar','📋','Planificar'],['deudas','⚖️','Deudas'],['ingresos','💰','Ingresos'],['impuestos','🧾','Impuestos'],['datos','⚙️','Datos']];
const TAX_TABLE=[{to:13.5,rate:0,rebate:0},{to:30,rate:.04,rebate:.54},{to:50,rate:.08,rebate:1.74},{to:70,rate:.135,rebate:4.49},{to:90,rate:.23,rebate:11.14},{to:120,rate:.304,rebate:17.8},{to:310,rate:.35,rebate:23.32},{to:Infinity,rate:.4,rebate:38.82}];
const DEFAULT={accounts:[{id:1,name:'Cuenta Corriente',type:'corriente',currency:'CLP',balance:0},{id:2,name:'Cuenta Ahorro',type:'ahorro',currency:'CLP',balance:0},{id:3,name:'Tarjeta Crédito',type:'credito',currency:'CLP',used:0,limit:1000000}],cats:[{id:1,name:'Alimentación',icon:'🛒'},{id:2,name:'Hogar',icon:'🏠'},{id:3,name:'Vehículo / Mant.',icon:'🔧'},{id:4,name:'Niños / Familia',icon:'👨‍👩‍👧‍👦'},{id:5,name:'Deudas / Préstamos',icon:'🏦'},{id:6,name:'Sueldo / Ingresos',icon:'💰'},{id:7,name:'Otros / Varios',icon:'📦'}],tx:[],vehicles:[{id:1,name:'Vehículo principal',odometer:0}],fuel:[],maint:[],plans:[],debts:[],income:[],settings:{utm:69542,extraCredits:0}};
let state=load(),tab='panel',vehicleSub='resumen';
function clone(x){return JSON.parse(JSON.stringify(x))}
function load(){try{return Object.assign(clone(DEFAULT),JSON.parse(localStorage.getItem(KEY))||{})}catch(e){return clone(DEFAULT)}}
function persist(msg='Guardado'){localStorage.setItem(KEY,JSON.stringify(state));render();toast(msg)}
function toast(t){let el=$('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1700)}
function $(id){return document.getElementById(id)}
function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function num(v){let s=String(v??'').trim().replace(/\s|\$/g,'');if(!s)return 0;if(s.includes(',')&&!s.includes('.'))return Number(s.replace(',','.'))||0;if(s.includes('.')&&!s.includes(','))return Number(s.replace(/\./g,''))||0;return Number(s.replace(/\./g,'').replace(',','.'))||0}
function clp(n){return new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0}).format(Math.round(Number(n||0)))}
function pct(n,d){return d>0?(n/d*100).toFixed(1)+'%':'0%'}
function today(){return new Date().toISOString().slice(0,10)}
function month(){return new Date().toISOString().slice(0,7)}
function uid(){return Date.now()+Math.floor(Math.random()*999)}
function accName(id){return state.accounts.find(a=>a.id==id)?.name||'Sin cuenta'}
function catName(id){return state.cats.find(c=>c.id==id)?.name||'Sin categoría'}
function setTab(t){tab=t;document.querySelectorAll('section[id^=view-]').forEach(s=>s.classList.add('hidden'));$('view-'+t).classList.remove('hidden');document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));$('title').textContent=TABS.find(x=>x[0]===t)?.[2]||'Finanzas';render()}
function initTabs(){let el=$('tabs');el.innerHTML=TABS.map(t=>`<button class='tab ${t[0]===tab?'active':''}' data-tab='${t[0]}'><span>${t[1]}</span>${t[2]}</button>`).join('');el.querySelectorAll('button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab))}
function totals(){let cash=state.accounts.filter(a=>a.type!=='credito').reduce((s,a)=>s+num(a.balance),0);let tc=state.accounts.filter(a=>a.type==='credito').reduce((s,a)=>s+num(a.used),0);let debt=state.debts.reduce((s,d)=>s+num(d.balance),0);let m=month();let out=state.tx.filter(x=>x.type==='gasto'&&String(x.date).slice(0,7)===m).reduce((s,x)=>s+num(x.amount),0);let inc=state.income.filter(x=>String(x.date).slice(0,7)===m).reduce((s,x)=>s+num(x.net),0);return{cash,tc,debt,out,inc,m}}
function adjustAccount(accountId,type,amount){let a=state.accounts.find(x=>x.id==accountId);if(!a)return;if(a.type==='credito'){a.used=Math.max(0,num(a.used)+(type==='gasto'?amount:-amount))}else{a.balance=num(a.balance)+(type==='ingreso'?amount:-amount)}}
function txCard(x,withDelete=false){return `<div class='item'><div><div class='name'>${esc(x.desc||'Movimiento')}</div><div class='meta'>${esc(x.date)} · ${esc(catName(x.catId))} · ${esc(accName(x.accountId))}</div></div><div class='amt ${x.type==='ingreso'?'green':'red'}'>${x.type==='ingreso'?'+':'-'}${clp(x.amount)}</div></div>${withDelete?`<button class='btn danger' onclick='delTx(${x.id})'>Eliminar</button>`:''}`}
function render(){renderPanel();renderRegistros();renderCuentas();renderCategorias();renderVehiculo();renderPlanificar();renderDeudas();renderIngresos();renderImpuestos();renderDatos()}
function renderPanel(){let t=totals(),recent=[...state.tx].sort((a,b)=>String(b.date).localeCompare(String(a.date))).slice(0,6);$('view-panel').innerHTML=`<div class='grid'><div class='card metric'><div class='label'>Saldo CLP</div><div class='value green'>${clp(t.cash)}</div></div><div class='card metric'><div class='label'>Deuda TC</div><div class='value red'>${clp(t.tc)}</div></div><div class='card metric'><div class='label'>Ingresos mes</div><div class='value blue'>${clp(t.inc)}</div></div><div class='card metric'><div class='label'>Gastos mes</div><div class='value amber'>${clp(t.out)}</div></div></div><div class='card warn'><div class='section-title'>Ahora integrada</div><p class='mini'>Esta versión mantiene las pestañas de Finanzas y agrega Ingresos e Impuestos dentro de la misma app. Ya no es un link externo. Está sanitizada: no contiene tus datos reales.</p></div><div class='card'><div class='section-title'>Últimos movimientos</div><div class='list'>${recent.length?recent.map(x=>txCard(x)).join(''):'<p class=mini>No hay movimientos todavía.</p>'}</div></div><div class='card'><div class='section-title'>Resumen anual ingresos</div>${incomeSummaryHtml()}</div>`}
function renderRegistros(){let acc=state.accounts.map(a=>`<option value='${a.id}'>${esc(a.name)}</option>`).join(''),cats=state.cats.map(c=>`<option value='${c.id}'>${esc(c.icon+' '+c.name)}</option>`).join('');$('view-registros').innerHTML=`<div class='card'><div class='section-title'>Nuevo registro</div><div class='form'><div><label>Tipo</label><select id='txType'><option value='gasto'>Gasto</option><option value='ingreso'>Ingreso</option></select></div><div><label>Fecha</label><input id='txDate' type='date' value='${today()}'></div><div class='full'><label>Descripción</label><input id='txDesc' placeholder='Ej. supermercado, bencina, transferencia'></div><div><label>Monto</label><input id='txAmount' inputmode='numeric' placeholder='5.990'></div><div><label>Categoría</label><select id='txCat'>${cats}</select></div><div class='full'><label>Cuenta</label><select id='txAcc'>${acc}</select></div></div><button class='btn' style='width:100%;margin-top:10px' onclick='addTx()'>Guardar registro</button></div><div class='card'><div class='section-title'>Registros</div><div class='list'>${state.tx.length?[...state.tx].reverse().map(x=>txCard(x,true)).join(''):'<p class=mini>Sin registros.</p>'}</div></div>`}
function addTx(){let amount=num($('txAmount').value);if(!amount)return toast('Ingresa monto');let x={id:uid(),type:$('txType').value,date:$('txDate').value,desc:$('txDesc').value,amount,catId:$('txCat').value,accountId:$('txAcc').value};state.tx.push(x);adjustAccount(x.accountId,x.type,amount);persist()}
function delTx(id){state.tx=state.tx.filter(x=>x.id!==id);persist('Eliminado')}
function renderCuentas(){$('view-cuentas').innerHTML=`<div class='card'><div class='section-title'>Nueva cuenta</div><div class='form'><div class='full'><label>Nombre</label><input id='accName' placeholder='Banco, efectivo, tarjeta'></div><div><label>Tipo</label><select id='accType'><option value='corriente'>Corriente</option><option value='ahorro'>Ahorro</option><option value='credito'>Crédito</option><option value='efectivo'>Efectivo</option></select></div><div><label>Saldo / usado</label><input id='accBal' inputmode='numeric' placeholder='0'></div></div><button class='btn' style='width:100%;margin-top:10px' onclick='addAcc()'>Agregar cuenta</button></div><div class='card'><div class='section-title'>Cuentas</div><div class='list'>${state.accounts.map(a=>`<div class='item'><div><div class='name'>${esc(a.name)}</div><div class='meta'>${esc(a.type)} · ${esc(a.currency||'CLP')}</div></div><div class='amt ${a.type==='credito'?'red':'green'}'>${clp(a.type==='credito'?a.used:a.balance)}</div></div><button class='btn danger' onclick='delAcc(${a.id})'>Eliminar</button>`).join('')}</div></div>`}
function addAcc(){let name=$('accName').value.trim();if(!name)return toast('Falta nombre');let type=$('accType').value,val=num($('accBal').value);state.accounts.push({id:uid(),name,type,currency:'CLP',balance:type==='credito'?0:val,used:type==='credito'?val:0,limit:0});persist()}
function delAcc(id){state.accounts=state.accounts.filter(a=>a.id!==id);persist('Cuenta eliminada')}
function renderCategorias(){$('view-categorias').innerHTML=`<div class='card'><div class='section-title'>Nueva categoría</div><div class='form'><div><label>Ícono</label><input id='catIcon' placeholder='🧾'></div><div><label>Nombre</label><input id='catName' placeholder='Ej. Regalos'></div></div><button class='btn' style='width:100%;margin-top:10px' onclick='addCat()'>Agregar categoría</button></div><div class='card'><div class='section-title'>Categorías</div><div class='list'>${state.cats.map(c=>`<div class='item'><div><div class='name'>${esc(c.icon)} ${esc(c.name)}</div><div class='meta'>Usada en ${state.tx.filter(x=>x.catId==c.id).length} registros</div></div><button class='btn danger' onclick='delCat(${c.id})'>Eliminar</button></div>`).join('')}</div></div>`}
function addCat(){let name=$('catName').value.trim();if(!name)return toast('Falta nombre');state.cats.push({id:uid(),name,icon:$('catIcon').value||'🧾'});persist()}
function delCat(id){state.cats=state.cats.filter(c=>c.id!==id);persist('Categoría eliminada')}
function renderVehiculo(){let v=state.vehicles[0]||{id:1,name:'Vehículo principal'};let logs=[...state.fuel].sort((a,b)=>num(b.km)-num(a.km));let last=logs[0],prev=logs[1];let diff=last&&prev?num(last.km)-num(prev.km):0;let l100=last&&diff>0?num(last.liters)/diff*100:0;let kml=last&&num(last.liters)>0&&diff>0?diff/num(last.liters):0;let acc=state.accounts.map(a=>`<option value='${a.id}'>${esc(a.name)}</option>`).join('');$('view-vehiculo').innerHTML=`<div class='chips'>${['resumen','bencina','mantenimiento','documentos'].map(x=>`<button class='chip ${vehicleSub===x?'active':''}' onclick='vehicleSub="${x}";renderVehiculo()'>${x}</button>`).join('')}</div>${vehicleSub==='resumen'?`<div class='grid' style='margin-top:10px'><div class='card metric'><div class='label'>Vehículo</div><div class='value blue'>${esc(v.name)}</div></div><div class='card metric'><div class='label'>Último rendimiento</div><div class='value green'>${kml?kml.toFixed(1)+' km/L':'-'}</div></div><div class='card metric'><div class='label'>Consumo</div><div class='value amber'>${l100?l100.toFixed(1)+' L/100':'-'}</div></div><div class='card metric'><div class='label'>Costos mant.</div><div class='value red'>${clp(state.maint.reduce((s,m)=>s+num(m.amount),0))}</div></div></div><div class='card'><div class='section-title'>Nota cálculo</div><p class='mini'>Rendimiento calculado con la última carga: litros de la última carga y diferencia de kilometraje respecto de la carga anterior.</p></div>`:''}${vehicleSub==='bencina'?`<div class='card'><div class='section-title'>Carga de combustible</div><div class='form'><div><label>Fecha</label><input id='fuelDate' type='date' value='${today()}'></div><div><label>Kilometraje</label><input id='fuelKm' inputmode='decimal' placeholder='80500'></div><div><label>Litros</label><input id='fuelLiters' inputmode='decimal' placeholder='10,7'></div><div><label>Monto</label><input id='fuelAmount' inputmode='numeric' placeholder='20.000'></div><div class='full'><label>Cuenta pago</label><select id='fuelAcc'>${acc}</select></div></div><button class='btn' style='width:100%;margin-top:10px' onclick='addFuel()'>Guardar carga y gasto</button></div><div class='card'><div class='section-title'>Historial bencina</div><div class='list'>${logs.length?logs.map(f=>`<div class='item'><div><div class='name'>${esc(f.date)} · ${num(f.liters).toString().replace('.',',')} L</div><div class='meta'>Km ${num(f.km).toLocaleString('es-CL')}</div></div><div class='amt red'>${clp(f.amount)}</div></div>`).join(''):'<p class=mini>Sin cargas.</p>'}</div></div>`:''}${vehicleSub==='mantenimiento'?`<div class='card'><div class='section-title'>Mantención / costo</div><div class='form'><div><label>Fecha</label><input id='mDate' type='date' value='${today()}'></div><div><label>Monto</label><input id='mAmount' inputmode='numeric'></div><div class='full'><label>Detalle</label><input id='mDesc' placeholder='Cambio aceite, plumillas, revisión'></div><div class='full'><label>Cuenta pago</label><select id='mAcc'>${acc}</select></div></div><button class='btn' style='width:100%;margin-top:10px' onclick='addMaint()'>Guardar mantención y gasto</button></div><div class='card'><div class='section-title'>Mantenciones</div><div class='list'>${state.maint.length?state.maint.map(m=>`<div class='item'><div><div class='name'>${esc(m.desc)}</div><div class='meta'>${esc(m.date)}</div></div><div class='amt red'>${clp(m.amount)}</div></div>`).join(''):'<p class=mini>Sin mantenciones.</p>'}</div></div>`:''}${vehicleSub==='documentos'?`<div class='card'><div class='section-title'>Documentos</div><p class='mini'>Espacio para permiso de circulación, SOAP, revisión técnica, seguros y vencimientos. En esta versión demo se dejó como módulo listo para completar.</p></div>`:''}`}
function addFuel(){let amount=num($('fuelAmount').value),km=num($('fuelKm').value),liters=num($('fuelLiters').value);if(!amount||!km||!liters)return toast('Faltan datos');state.fuel.push({id:uid(),date:$('fuelDate').value,km,liters,amount});let tx={id:uid(),type:'gasto',date:$('fuelDate').value,desc:'Combustible vehículo',amount,catId:3,accountId:$('fuelAcc').value};state.tx.push(tx);adjustAccount(tx.accountId,'gasto',amount);persist()}
function addMaint(){let amount=num($('mAmount').value),desc=$('mDesc').value;if(!amount||!desc)return toast('Faltan datos');state.maint.push({id:uid(),date:$('mDate').value,amount,desc});let tx={id:uid(),type:'gasto',date:$('mDate').value,desc:'Vehículo — '+desc,amount,catId:3,accountId:$('mAcc').value};state.tx.push(tx);adjustAccount(tx.accountId,'gasto',amount);persist()}
function renderPlanificar(){let acc=state.accounts.map(a=>`<option value='${a.id}'>${esc(a.name)}</option>`).join('');$('view-planificar').innerHTML=`<div class='card'><div class='section-title'>Gasto planificado</div><div class='form'><div><label>Fecha</label><input id='pDate' type='date' value='${today()}'></div><div><label>Monto</label><input id='pAmount' inputmode='numeric'></div><div class='full'><label>Descripción</label><input id='pDesc' placeholder='Colegio, dividendo, regalo, cuenta'></div><div class='full'><label>Cuenta para pagar</label><select id='pAcc'>${acc}</select></div></div><button class='btn' style='width:100%;margin-top:10px' onclick='addPlan()'>Agregar planificado</button></div><div class='card'><div class='section-title'>Pendientes</div><div class='list'>${state.plans.length?state.plans.map(p=>`<div class='item'><div><div class='name'>${esc(p.desc)}</div><div class='meta'>${esc(p.date)} · ${esc(accName(p.accountId))}</div></div><div class='amt amber'>${clp(p.amount)}</div></div><div class='actions'><button class='btn green' onclick='payPlan(${p.id})'>Marcar pagado</button><button class='btn danger' onclick='delPlan(${p.id})'>Eliminar</button></div>`).join(''):'<p class=mini>No hay gastos planificados.</p>'}</div></div>`}
function addPlan(){let amount=num($('pAmount').value),desc=$('pDesc').value;if(!amount||!desc)return toast('Faltan datos');state.plans.push({id:uid(),date:$('pDate').value,amount,desc,accountId:$('pAcc').value});persist()}
function payPlan(id){let p=state.plans.find(x=>x.id===id);if(!p)return;state.tx.push({id:uid(),type:'gasto',date:today(),desc:p.desc,amount:p.amount,catId:7,accountId:p.accountId});adjustAccount(p.accountId,'gasto',p.amount);state.plans=state.plans.filter(x=>x.id!==id);persist('Pagado y movido a registros')}
function delPlan(id){state.plans=state.plans.filter(x=>x.id!==id);persist('Eliminado')}
function renderDeudas(){$('view-deudas').innerHTML=`<div class='card'><div class='section-title'>Nueva deuda</div><div class='form'><div class='full'><label>Nombre</label><input id='dName' placeholder='Crédito, préstamo, tarjeta'></div><div><label>Saldo</label><input id='dBal' inputmode='numeric'></div><div><label>Cuota</label><input id='dPay' inputmode='numeric'></div></div><button class='btn' style='width:100%;margin-top:10px' onclick='addDebt()'>Agregar deuda</button></div><div class='card'><div class='section-title'>Deudas</div><div class='list'>${state.debts.length?state.debts.map(d=>`<div class='item'><div><div class='name'>${esc(d.name)}</div><div class='meta'>Cuota ${clp(d.payment)}</div></div><div class='amt red'>${clp(d.balance)}</div></div><button class='btn danger' onclick='delDebt(${d.id})'>Eliminar</button>`).join(''):'<p class=mini>Sin deudas.</p>'}</div></div>`}
function addDebt(){let name=$('dName').value.trim();if(!name)return toast('Falta nombre');state.debts.push({id:uid(),name,balance:num($('dBal').value),payment:num($('dPay').value)});persist()}
function delDebt(id){state.debts=state.debts.filter(d=>d.id!==id);persist('Deuda eliminada')}
function incomeSummaryHtml(){let y=new Date().getFullYear();let list=state.income.filter(i=>new Date(i.date).getFullYear()===y);let gross=list.reduce((s,i)=>s+num(i.gross),0),net=list.reduce((s,i)=>s+num(i.net),0),pen=list.reduce((s,i)=>s+num(i.pensionPayment),0),tax=list.reduce((s,i)=>s+num(i.tax),0);return `<div class='grid'><div class='metric'><div class='label'>Haberes año</div><div class='value blue'>${clp(gross)}</div></div><div class='metric'><div class='label'>Líquido año</div><div class='value green'>${clp(net)}</div></div><div class='metric'><div class='label'>Pensión pagada</div><div class='value amber'>${clp(pen)}</div></div><div class='metric'><div class='label'>Impuesto retenido</div><div class='value red'>${clp(tax)}</div></div></div>`}
function renderIngresos(){let acc=state.accounts.map(a=>`<option value='${a.id}'>${esc(a.name)}</option>`).join('');$('view-ingresos').innerHTML=`<div class='card'><div class='section-title'>Nuevo ingreso / liquidación</div><div class='form'><div><label>Tipo</label><select id='iType'><option value='sueldo'>Sueldo</option><option value='bono'>Bono</option><option value='pension'>Pensión pagada</option><option value='otro'>Otro ingreso</option></select></div><div><label>Fecha pago</label><input id='iDate' type='date' value='${today()}'></div><div class='full'><label>Descripción</label><input id='iDesc' placeholder='Sueldo abril, bono, pensión'></div><div><label>Total haberes</label><input id='iGross' inputmode='numeric'></div><div><label>Líquido</label><input id='iNet' inputmode='numeric'></div><div><label>AFP</label><input id='iAfp' inputmode='numeric'></div><div><label>Isapre/Salud</label><input id='iHealth' inputmode='numeric'></div><div><label>AFC</label><input id='iAfc' inputmode='numeric'></div><div><label>Impuesto retenido</label><input id='iTax' inputmode='numeric'></div><div><label>Base tributable</label><input id='iTaxable' inputmode='numeric'></div><div><label>Pensión pagada</label><input id='iPension' inputmode='numeric'></div><div><label>Año renta</label><input id='iRentYear' inputmode='numeric' value='${new Date().getFullYear()}'></div><div><label>Cuenta destino</label><select id='iAcc'>${acc}</select></div><label class='check full'><input id='iMove' type='checkbox' checked> Registrar también como movimiento y actualizar cuenta</label></div><button class='btn' style='width:100%;margin-top:10px' onclick='addIncome()'>Guardar ingreso</button></div><div class='card'><div class='section-title'>Resumen</div>${incomeSummaryHtml()}</div><div class='card'><div class='section-title'>Registros de ingresos</div><div class='list'>${state.income.length?[...state.income].reverse().map(i=>`<div class='item'><div><div class='name'>${esc(i.desc||i.type)}</div><div class='meta'>${esc(i.date)} · ${esc(i.type)} · Base ${clp(i.taxable)} · Pensión ${clp(i.pensionPayment)}</div></div><div class='amt green'>${clp(i.net)}</div></div><button class='btn danger' onclick='delIncome(${i.id})'>Eliminar</button>`).join(''):'<p class=mini>Sin ingresos.</p>'}</div></div>`}
function addIncome(){let net=num($('iNet').value),gross=num($('iGross').value),type=$('iType').value,pension=num($('iPension').value);if(type!=='pension'&&!net&&!gross)return toast('Faltan montos');let i={id:uid(),type,date:$('iDate').value,desc:$('iDesc').value||type,gross,net,afp:num($('iAfp').value),health:num($('iHealth').value),afc:num($('iAfc').value),tax:num($('iTax').value),taxable:num($('iTaxable').value)||gross,pensionPayment:pension,rentYear:num($('iRentYear').value)};state.income.push(i);if($('iMove').checked&&net>0){let tx={id:uid(),type:'ingreso',date:i.date,desc:'Ingreso — '+i.desc,amount:net,catId:6,accountId:$('iAcc').value};state.tx.push(tx);adjustAccount(tx.accountId,'ingreso',net)}persist()}
function delIncome(id){state.income=state.income.filter(i=>i.id!==id);persist('Ingreso eliminado')}
function taxCalc(year){let list=state.income.filter(i=>num(i.rentYear||new Date(i.date).getFullYear())===year);let base=list.reduce((s,i)=>s+num(i.taxable),0),ret=list.reduce((s,i)=>s+num(i.tax),0),bonus=list.filter(i=>i.type==='bono').reduce((s,i)=>s+num(i.taxable),0);let uta=num(state.settings.utm)*12,baseUTA=uta?base/uta:0,row=TAX_TABLE.find(r=>baseUTA<=r.to)||TAX_TABLE[0];let calc=Math.max(0,(baseUTA*row.rate-row.rebate)*uta);let balance=calc-ret-num(state.settings.extraCredits);return{base,ret,bonus,uta,baseUTA,calc,balance}}
function renderImpuestos(){let year=new Date().getFullYear(),r=taxCalc(year);$('view-impuestos').innerHTML=`<div class='card'><div class='section-title'>Supuestos</div><div class='form'><div><label>Año renta</label><input id='taxYearInput' inputmode='numeric' value='${year}' oninput='showTaxYear()'></div><div><label>UTM diciembre</label><input id='utmVal' inputmode='numeric' value='${state.settings.utm}'></div><div class='full'><label>Créditos adicionales</label><input id='extraCredits' inputmode='numeric' value='${state.settings.extraCredits}'></div></div><button class='btn sec' style='width:100%;margin-top:10px' onclick='saveTaxSettings()'>Guardar supuestos</button></div><div class='card'><div class='section-title'>Impuesto estimado</div><div id='taxBox'>${taxBox(r,year)}</div></div><div class='card warn'><div class='section-title'>Referencia</div><p class='mini'>Cálculo orientativo de Global Complementario con tabla anual en UTA y descuento de impuesto retenido. Sirve para planificación, no reemplaza la declaración oficial del SII.</p></div>`}
function taxBox(r,y){return `<div class='grid'><div class='metric'><div class='label'>Base tributable</div><div class='value blue'>${clp(r.base)}</div></div><div class='metric'><div class='label'>Bono asignado</div><div class='value amber'>${clp(r.bonus)}</div></div><div class='metric'><div class='label'>Impuesto estimado</div><div class='value red'>${clp(r.calc)}</div></div><div class='metric'><div class='label'>Pagar / recuperar</div><div class='value ${r.balance>0?'red':'green'}'>${clp(r.balance)}</div></div></div><p class='mini' style='margin-top:10px'>Año renta ${y} · Base ${r.baseUTA.toFixed(2)} UTA · Retenido ${clp(r.ret)}</p>`}
function saveTaxSettings(){state.settings.utm=num($('utmVal').value);state.settings.extraCredits=num($('extraCredits').value);persist('Supuestos guardados')}
function showTaxYear(){let y=num($('taxYearInput').value)||new Date().getFullYear();$('taxBox').innerHTML=taxBox(taxCalc(y),y)}
function renderDatos(){$('view-datos').innerHTML=`<div class='card'><div class='section-title'>Datos locales</div><p class='mini'>Todo queda guardado en este navegador. El código está en GitHub, pero tus datos ingresados no se suben a GitHub.</p><div class='hr'></div><div class='list'><div class='item'><div><div class='name'>Registros</div><div class='meta'>Movimientos financieros</div></div><div class='amt'>${state.tx.length}</div></div><div class='item'><div><div class='name'>Ingresos</div><div class='meta'>Liquidaciones, bonos y pensión</div></div><div class='amt'>${state.income.length}</div></div><div class='item'><div><div class='name'>Cuentas</div><div class='meta'>Cuentas y tarjetas</div></div><div class='amt'>${state.accounts.length}</div></div></div><div class='actions'><button class='btn sec' onclick='exportData()'>Exportar JSON</button><button class='btn sec' onclick='importFile.click()'>Importar JSON</button></div><button class='btn danger' style='width:100%;margin-top:9px' onclick='resetAll()'>Limpiar app</button></div><div class='card warn'><div class='section-title'>Pendiente</div><p class='mini'>Siguiente mejora: fusionar esta demo con el código React original completo, manteniendo tus pestañas y agregando importación Excel/CSV/PDF como en Ingresos/Pensión.</p></div>`}
function exportData(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='finanzas-integrada-respaldo.json';a.click();URL.revokeObjectURL(a.href)}
$('importFile').onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{state=Object.assign(clone(DEFAULT),JSON.parse(r.result));persist('Importado')}catch(err){toast('JSON inválido')}};r.readAsText(f)}
function resetAll(){if(confirm('¿Limpiar todos los datos de prueba?')){state=clone(DEFAULT);persist('App limpia')}}
initTabs();render();
</script>
</body>
</html>
