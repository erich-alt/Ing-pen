<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Control Ingresos">
  <meta name="theme-color" content="#0f766e">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-180.png">
  <title>Control Ingresos</title>
</head>
<body>
  <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:24px;color:#0f302d;">Cargando Control Ingresos...</div>
  <script>
    (async function () {
      try {
        const response = await fetch('./index.html?v=base', { cache: 'no-store' });
        let html = await response.text();
        if (!html.includes('fixes.js')) {
          html = html.replace('</body>', '  <script src="./fixes.js?v=4"><\\/script>\n</body>');
        }
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<div style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:24px;"><h1>No se pudo abrir la app</h1><p>Abre una vez con internet para actualizar los archivos offline.</p></div>';
      }
    })();
  </script>
</body>
</html>
